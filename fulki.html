<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6E3B83">
  <link rel="manifest" href="manifest.json">
  <title>Fulki Tracker</title>
  <style>
    :root {
      --bg:       #FAF5FC;
      --surface:  #FFFFFF;
      --border:   #EDD8EE;
      --border-2: #DFC4E0;
      --text:     #3D1A4A;
      --text-2:   #6E3B83;
      --text-3:   #B56AB2;
      --text-4:   #D4A0D5;
      --accent:   #F89831;
      --accent-d: #D17078;
      color-scheme: light dark;
    }
    body.dark {
      --bg:#181b38; --surface:#292f56; --border:#363d6e; --border-2:#464f88;
      --text:#d8e8f8; --text-2:#7eb8c8; --text-3:#4c7890; --text-4:#2a3f58;
      --accent:#008780; --accent-d:#005c7f;
    }
    body.dark #header-bar { background: #005c7f; }
    body.dark .log-btn { filter: none; background: #363d70 !important; }
    body.dark .btn-label { color: #ffffff !important; }
    body.dark .vet-type-btn { filter: none; background: #1e2445 !important; }
    body.dark .pred-card { background: var(--surface) !important; }
    body.dark .stats-stat-card, body.dark .stats-peaks-card,
    body.dark .weight-chart-wrap, body.dark .corr-card { background: #1e2445; }
    @media (prefers-color-scheme: dark) {
      body:not(.light) {
        --bg:#181b38; --surface:#292f56; --border:#363d6e; --border-2:#464f88;
        --text:#d8e8f8; --text-2:#7eb8c8; --text-3:#4c7890; --text-4:#2a3f58;
        --accent:#008780; --accent-d:#005c7f;
      }
      body:not(.light) #header-bar { background: #005c7f; }
      body:not(.light) .log-btn { filter: none; background: #363d70 !important; }
      body:not(.light) .btn-label { color: #ffffff !important; }
      body:not(.light) .vet-type-btn { filter: none; background: #1e2445 !important; }
      body:not(.light) .pred-card { background: var(--surface) !important; }
      body:not(.light) .stats-stat-card, body:not(.light) .stats-peaks-card,
      body:not(.light) .weight-chart-wrap, body:not(.light) .corr-card { background: #1e2445; }
    }

    /* ── Accessibility mode ── */
    #a11y-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    #a11y-btn.on {
      background: #B04F6C;
      border-color: rgba(255,255,255,0.9);
      box-shadow: 0 0 0 3px rgba(176,79,108,0.35);
    }
    #dark-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 10px; color: #fff;
      font-family: inherit; font-size: 14px;
      padding: 6px 10px; cursor: pointer;
      min-height: 36px; min-width: 36px;
      transition: background 0.25s, border-color 0.25s;
      line-height: 1;
    }
    #dark-btn:active { opacity: 0.75; }

    body.a11y                  { font-size: 20px; }
    body.a11y #header-title    { font-size: 34px; }
    body.a11y #header-subtitle { font-size: 14px; }
    body.a11y .section-label   { font-size: 14px; }
    body.a11y .log-btn         { padding: 22px 6px 18px; }
    body.a11y .btn-emoji       { font-size: 42px; }
    body.a11y .timeline-entry  { padding: 16px; min-height: 56px; }
    body.a11y .tl-label        { font-size: 20px; }
    body.a11y .tl-time         { font-size: 16px; }
    body.a11y .summary-pill    { font-size: 15px; padding: 8px 16px; }
    body.a11y .pred-time       { font-size: 20px; }
    body.a11y .pred-lbl        { font-size: 14px; }
    body.a11y .pred-emoji      { font-size: 30px; }
    body.a11y .nav-btn .nav-icon  { font-size: 22px; }
    body.a11y .nav-btn .nav-label { font-size: 13px; }
    body.a11y .vet-note-type   { font-size: 20px; }
    body.a11y .vet-note-detail { font-size: 18px; }
    body.a11y .vet-field-lbl   { font-size: 16px; }
    body.a11y .vet-input       { font-size: 18px; padding: 11px 14px; }
    body.a11y .vet-form-title  { font-size: 20px; }
    body.a11y .vet-save-btn    { font-size: 18px; padding: 14px; }
    body.a11y .vet-cancel-btn  { font-size: 18px; }
    body.a11y .vet-type-btn    { font-size: 15px; padding: 14px 8px; }
    body.a11y .vet-type-icon   { font-size: 26px; }
    body.a11y .stats-pill      { font-size: 18px; padding: 8px 16px; }
    body.a11y .stats-stat-val  { font-size: 24px; }
    body.a11y .stats-stat-lbl  { font-size: 16px; }
    body.a11y .heatmap-day-lbl { font-size: 11px; }
    body.a11y .tl-delete       { font-size: 24px; min-width: 48px; min-height: 52px; }
    body.a11y .empty-state     { font-size: 20px; }

    /* ── Photo upload ── */
    .photo-upload-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--surface); border: 1.5px dashed var(--border-2);
      border-radius: 10px; padding: 10px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--text-2);
    }
    .photo-upload-btn:active { opacity: 0.75; }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Cochin', 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.15); }
      65%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    @keyframes pulse-opacity { 0%,100%{opacity:1} 50%{opacity:0.6} }
    @keyframes napglow {
      0%,100% { background: rgba(110,59,131,0.08); border-color: #D4B8E8; }
      50%     { background: rgba(110,59,131,0.16); border-color: #B56AB2; }
    }

    #app-wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background: var(--bg);
    }

    #card {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Header ── */
    #header-bar {
      background: #B04F6C;
      color: #fff;
      padding: 22px 20px 16px;
      flex-shrink: 0;
    }
    #header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    #header-title    { font-size: 26px; font-weight: 700; line-height: 1.1; }
    #header-subtitle { font-size: 11px; font-weight: 600; opacity: 0.8; margin-top: 3px; letter-spacing: 0.8px; text-transform: uppercase; }
    #header-date     { margin-top: 10px; font-size: 13px; font-weight: 600; opacity: 0.85; }

    .edit-name-btn {
      background: rgba(255,255,255,0.22);
      border: none; border-radius: 10px;
      color: #fff; font-family: inherit;
      font-size: 12px; font-weight: 700;
      padding: 6px 12px; cursor: pointer;
      min-height: 36px; flex-shrink: 0;
    }

    /* ── Name edit bar ── */
    #name-edit-bar {
      background: #FFF8F0;
      border-bottom: 1px solid var(--border-2);
      padding: 12px 20px;
      display: none;
      gap: 8px;
      flex-shrink: 0;
    }
    #puppy-name-input {
      flex: 1; border: 2px solid var(--accent);
      border-radius: 10px; padding: 8px 12px;
      font-size: 15px; font-weight: 600;
      color: var(--text); font-family: inherit;
      outline: none; background: #fff;
    }
    .name-save-btn {
      background: var(--accent); border: none;
      border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 700;
      padding: 8px 18px; cursor: pointer; font-family: inherit;
    }

    /* ── Summary strip ── */
    #summary-strip {
      display: flex; gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; flex-shrink: 0;
    }
    #summary-strip::-webkit-scrollbar { display: none; }

    .summary-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Scrollable content ── */
    #tab-content {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 70px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Home inner ── */
    #home-inner { padding: 18px 20px 0; }

    /* ── Section labels ── */
    .section-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 10px;
    }

    /* ── Learning stage banner ── */
    #learning-stage {
      background: #FFF8F0; border: 1.5px solid var(--border-2);
      border-radius: 12px; padding: 10px 14px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .stage-icon { font-size: 16px; flex-shrink: 0; }
    .stage-body { flex: 1; }
    .stage-label { font-size: 12px; font-weight: 700; color: var(--text-2); }
    .stage-bar-bg { margin-top: 4px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .stage-bar-fill { height: 100%; background: linear-gradient(90deg, #B56AB2, #F89831); border-radius: 2px; transition: width 0.6s; }
    .stage-pct { font-size: 11px; font-weight: 700; color: var(--text-3); min-width: 34px; text-align: right; font-family: sans-serif; }

    /* ── Prediction cards ── */
    #prediction-section { margin-bottom: 6px; }

    .predictions-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 6px;
    }

    .pred-card {
      border-radius: 16px; padding: 13px 8px 11px;
      text-align: center; border: 1.5px solid;
    }
    .pred-card.urgent { animation: pulse-opacity 1.8s infinite; }

    .pred-emoji  { font-size: 22px; margin-bottom: 3px; }
    .pred-time   { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .pred-lbl    { font-size: 10px; opacity: 0.72; margin-top: 2px; }

    .conf-bar-wrap { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
    .conf-bar-bg   { flex: 1; height: 4px; background: rgba(0,0,0,0.08); border-radius: 2px; overflow: hidden; }
    .conf-bar      { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .conf-pct      { font-size: 9px; font-weight: 700; opacity: 0.6; min-width: 26px; font-family: sans-serif; }

    .pred-source { font-size: 9px; opacity: 0.55; margin-top: 4px; font-style: italic; }

    .pred-note {
      font-size: 10px; color: var(--text-4); font-weight: 600;
      margin-bottom: 20px; text-align: center;
    }

    /* ── Active nap banner ── */
    #nap-banner {
      border: 2px solid #D4B8E8; border-radius: 14px;
      padding: 12px 16px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
      animation: napglow 2.2s infinite;
    }
    .nap-banner-emoji { font-size: 22px; flex-shrink: 0; }
    .nap-banner-body  { flex: 1; }
    .nap-banner-title { font-size: 14px; font-weight: 700; color: #6E3B83; }
    .nap-banner-sub   { font-size: 12px; color: #B56AB2; margin-top: 1px; font-weight: 600; }
    .nap-wake-btn {
      background: #6E3B83; border: none; border-radius: 10px;
      color: #fff; font-family: inherit;
      font-size: 12px; font-weight: 700;
      padding: 7px 12px; cursor: pointer; flex-shrink: 0;
    }

    /* ── Log section ── */
    #log-section { margin-bottom: 0; }

    #walkies-btn {
      width: 100%;
      background: linear-gradient(135deg, #F0E8F8, #FDE8F0);
      border: 2px solid #DFC4E0; border-radius: 16px;
      padding: 13px 16px; font-family: inherit;
      font-size: 14px; font-weight: 700; color: #6E3B83;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 14px;
    }
    #walkies-btn:active { opacity: 0.82; }

    #log-buttons-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 28px;
    }

    .log-btn {
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      padding: 14px 4px 11px;
      border-radius: 18px; cursor: pointer;
      border: 2.5px solid transparent;
      font-family: inherit; user-select: none;
      transition: opacity 0.12s;
    }
    .log-btn:active { opacity: 0.75; }
    .log-btn.nap-active { animation: napglow 2.2s infinite; border-color: #B56AB2; }

    .btn-emoji { font-size: 24px; line-height: 1; }
    .btn-label { font-size: 10px; font-weight: 700; }

    /* ── Timeline ── */
    #timeline-section { margin-top: 0; }
    .tl-section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-3); margin-bottom: 12px;
    }

    .timeline-entry {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; background: var(--surface);
      border-radius: 14px; margin-bottom: 8px;
      border: 1.5px solid;
    }

    .tl-emoji { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
    .tl-body  { flex: 1; min-width: 0; }
    .tl-label { font-size: 13px; font-weight: 700; }
    .tl-dur   { font-weight: 600; font-size: 11px; color: #9B8EC4; margin-left: 6px; }
    .tl-time  { font-size: 11px; color: var(--text-3); font-weight: 600; margin-top: 1px; }

    .tl-time-value { cursor: pointer; border-bottom: 1px dashed var(--text-3); }

    .tl-time-input {
      font-family: inherit; font-size: 11px;
      border: 1px solid var(--accent); border-radius: 5px;
      padding: 1px 5px; color: var(--text);
      background: var(--surface); width: 88px; outline: none;
    }

    .tl-delete {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: #D0B090; line-height: 1;
      padding: 4px 6px; border-radius: 6px;
      min-height: 44px; min-width: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s; flex-shrink: 0;
    }
    .tl-delete:active { color: #B91C1C; }

    .empty-state {
      text-align: center; padding: 28px 0 20px;
      color: var(--text-4); font-size: 14px; line-height: 1.9;
    }
    .empty-state .sub { font-size: 12px; font-weight: 600; display: block; }

    /* ── Stats tab ── */
    #stats-tab { padding: 18px 20px; }

    .stats-cat-pills { display: flex; gap: 7px; margin-bottom: 20px; flex-wrap: wrap; }
    .stats-pill {
      border: 2px solid; border-radius: 20px;
      padding: 5px 12px; font-family: inherit;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stats-stat-card {
      flex: 1; background: var(--surface);
      border: 1.5px solid var(--border-2);
      border-radius: 12px; padding: 10px 8px; text-align: center;
    }
    .stats-stat-val { font-size: 18px; font-weight: 700; }
    .stats-stat-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; }

    .chart-half-label { font-size: 10px; color: var(--text-3); font-weight: 700; margin-bottom: 8px; }

    .chart-grid {
      display: grid; grid-template-columns: repeat(12, 1fr);
      gap: 3px; margin-bottom: 12px;
    }
    .chart-col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .chart-bar-wrap {
      width: 100%; height: 50px; background: var(--border);
      border-radius: 4px; overflow: hidden;
      display: flex; align-items: stretch;
    }
    .chart-bar { width: 100%; border-radius: 4px; transition: opacity 0.4s; }
    .chart-hr-lbl { font-size: 7px; color: var(--text-3); font-family: sans-serif; }
    .chart-ct     { font-size: 8px; font-weight: 800; font-family: sans-serif; }

    .stats-peaks-card {
      background: #FFF8F0; border: 1.5px solid var(--border-2);
      border-radius: 14px; padding: 14px 16px; margin-top: 18px;
    }
    .peaks-title {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .peak-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .peak-row:last-child { margin-bottom: 0; }
    .peak-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .peak-bar    { height: 100%; border-radius: 3px; }
    .peak-hr { font-size: 12px; font-weight: 700; color: var(--text-2); min-width: 36px; text-align: right; }
    .peak-ct { font-size: 11px; color: var(--text-3); min-width: 20px; }

    /* ── Vet tab ── */
    #vet-tab { padding: 18px 20px; }

    .vet-type-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 20px;
    }
    .vet-type-btn {
      background: #FFF8F0; border: 1.5px solid var(--border-2);
      border-radius: 12px; padding: 10px 6px;
      font-family: inherit; font-size: 11px; font-weight: 700;
      color: var(--text-2); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .vet-type-btn:active { opacity: 0.75; }
    .vet-type-icon { font-size: 18px; }

    .vet-form-card {
      background: #FFF8F0; border: 2px solid var(--accent);
      border-radius: 16px; padding: 16px; margin-bottom: 20px;
    }
    .vet-form-title { font-size: 14px; font-weight: 700; color: var(--text-2); margin-bottom: 14px; }

    .vet-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .vet-field-lbl { font-size: 11px; color: var(--text-3); font-weight: 600; }

    .vet-input {
      padding: 8px 12px; border-radius: 10px;
      border: 1.5px solid var(--border-2);
      font-family: inherit; font-size: 13px;
      color: var(--text); background: #fff;
      outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    .vet-input:focus { border-color: var(--accent); }
    .vet-textarea { min-height: 72px; resize: vertical; }

    .vet-form-actions { display: flex; gap: 8px; margin-top: 14px; }
    .vet-save-btn {
      flex: 1; background: var(--accent); border: none;
      border-radius: 10px; color: #fff; font-family: inherit;
      font-size: 13px; font-weight: 700; padding: 10px; cursor: pointer;
    }
    .vet-cancel-btn {
      padding: 10px 16px; background: #F5EDE3;
      border: 1.5px solid var(--border-2); border-radius: 10px;
      color: var(--text-2); font-family: inherit;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }

    .vet-note-list { display: flex; flex-direction: column; gap: 8px; }
    .vet-note-entry {
      background: var(--surface); border-radius: 14px;
      padding: 12px 14px; border: 1.5px solid var(--border-2);
      display: flex; align-items: flex-start; gap: 12px;
    }
    .vet-note-entry.overdue  { border-color: #FCA5A5; }
    .vet-note-entry.due-soon { border-color: #FDE047; }

    .vet-note-icon   { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .vet-note-body   { flex: 1; min-width: 0; }
    .vet-note-type   { font-size: 13px; font-weight: 700; }
    .vet-note-detail { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .vet-note-next   { font-size: 11px; font-weight: 600; margin-top: 3px; }
    .vet-note-next.overdue  { color: #B91C1C; }
    .vet-note-next.due-soon { color: #854D0E; }
    .vet-note-next.ok       { color: var(--text-3); }

    .vet-note-delete, .vet-note-edit {
      background: none; border: none; color: #D0B090;
      font-size: 16px; line-height: 1; cursor: pointer;
      padding: 2px 4px; flex-shrink: 0;
      min-height: 36px; min-width: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s;
    }
    .vet-note-delete:active { color: #B91C1C; }
    .vet-note-edit:active   { color: #6E3B83; }

    /* ── Bottom nav ── */
    #bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }

    .nav-btn {
      flex: 1; padding: 10px 0 12px;
      border: none; border-top: 2.5px solid transparent;
      background: none; cursor: pointer; font-family: inherit;
      display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      color: var(--text-3); transition: color 0.15s;
    }
    .nav-btn .nav-icon  { font-size: 18px; }
    .nav-btn .nav-label { font-size: 10px; font-weight: 700; }
    .nav-btn.active { color: var(--accent); border-top: 2.5px solid var(--accent); }

    /* ── Toast ── */
    #toast {

<script>
// ============================================================

// ============================================================
const USE_MOCK = false;

const firebaseConfig = {

  authDomain:        "fulki-tracker.firebaseapp.com",
  projectId:         "fulki-tracker",
  storageBucket:     "fulki-tracker.firebasestorage.app",
  messagingSenderId: "1011227937532",
  appId:             "1:1011227937532:web:17dc20b0969fb069ee2579",
  measurementId:     "G-YNFS44HM2W"
};

// ── Mock data (only active when USE_MOCK = true) ──
const _now = Date.now();
const _h   = 3600000;
const MOCK = {
  settings: { puppyName: 'Fulki' },
  logs: [
    { id:'m1',  type:'pee',     timestamp: new Date(_now - 0.4*_h) },
    { id:'m2',  type:'food',    timestamp: new Date(_now - 1.0*_h) },
    { id:'m3',  type:'water',   timestamp: new Date(_now - 1.5*_h) },

    { id:'m7',  type:'zoomies', timestamp: new Date(_now - 5.0*_h) },
    { id:'m8',  type:'pee',     timestamp: new Date(_now - 6.0*_h) },
    { id:'m9',  type:'food',    timestamp: new Date(_now - 7.2*_h) },
    { id:'m10', type:'poop',    timestamp: new Date(_now - 8.0*_h) },
    { id:'m11', type:'nap',     timestamp: new Date(_now - 10.0*_h), napEnd: new Date(_now - 9.0*_h), duration: 60 },
    { id:'m12', type:'pee',     timestamp: new Date(_now - 10.3*_h) },
    { id:'m13', type:'water',   timestamp: new Date(_now - 11.0*_h) },
    { id:'m14', type:'pee',     timestamp: new Date(_now - 12.0*_h) },
    { id:'m15', type:'pee',     timestamp: new Date(_now - 24*_h - 0.5*_h) },
    { id:'m16', type:'pee',     timestamp: new Date(_now - 24*_h - 4.0*_h) },
    { id:'m17', type:'pee',     timestamp: new Date(_now - 24*_h - 8.0*_h) },
    { id:'m18', type:'poop',    timestamp: new Date(_now - 24*_h - 1.0*_h) },
    { id:'m19', type:'poop',    timestamp: new Date(_now - 24*_h - 7.0*_h) },
    { id:'m20', type:'food',    timestamp: new Date(_now - 24*_h - 1.0*_h) },
    { id:'m21', type:'food',    timestamp: new Date(_now - 24*_h - 7.0*_h) },
    { id:'m22', type:'zoomies', timestamp: new Date(_now - 24*_h - 5.0*_h) },
    { id:'m23', type:'water',   timestamp: new Date(_now - 24*_h - 2.0*_h) },
    { id:'m24', type:'nap',     timestamp: new Date(_now - 48*_h - 4.0*_h), napEnd: new Date(_now - 48*_h - 3.0*_h), duration: 60 },
  ],
  vetNotes: [
    { id:'v1', category:'weight',      date: new Date(_now - 7*24*_h),  value:'8.2 kg',             notes:'Vet check — healthy!' },
    { id:'v2', category:'vaccination', date: new Date(_now - 14*24*_h), value:'Parvovirus booster',  notes:'' },
  ]
};

// ============================================================
// B — STATE
// ============================================================
const state = {
  tab:              'home',
  logs:             [],
  settings:         { puppyName: 'Fulki' },
  vetNotes:         [],
  napInProgress:    null,
  predictions:      {},
  selectedStatsCat: 'pee',
  vetFormType:      null,
  vetFormData:      {},
  vetEditingId:     null,
  viewDate:         new Date(),
  catNotes:         {},   // { pee: [{id, text, date}], … }
  activeCatNote:    null, // cat key currently being edited
  waterSizePending: false,
  vetFilter:        { type: 'all', search: '' },
  sheetsUrl:        '',
};

function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function startOfDay(d) { const r=new Date(d); r.setHours(0,0,0,0); return r; }
function endOfDay(d)   { const r=new Date(d); r.setHours(23,59,59,999); return r; }

// Prediction constants needed before Firebase init calls computePredictions()
const PREDICT_CATS = ['pee','poop','nap'];
const DECAY  = 0.05;
const WINDOW = 50;

// ============================================================
// C — FIREBASE INIT & LISTENERS
// ============================================================
let db = null;

if (!USE_MOCK) {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  db.enablePersistence().catch(() => {});

  // Silent anonymous auth so security rules can require request.auth != null
  firebase.auth().signInAnonymously().catch(e => console.warn('Auth:', e.message));

  // Load catNotes from localStorage (no Firestore collection needed)
  try {
    const _cn = JSON.parse(localStorage.getItem('fulki_catNotes') || '{}');
    Object.entries(_cn).forEach(([cat, val]) => {
      if (typeof val === 'string' && val.trim()) _cn[cat] = [{ id: 'n' + Date.now(), text: val, date: new Date().toISOString() }];
      else if (!Array.isArray(val)) delete _cn[cat];
    });
    state.catNotes = _cn;
  } catch(e) {}

  const toDate = ts => ts?.toDate ? ts.toDate() : ts;

  db.collection('logs').orderBy('timestamp','desc').onSnapshot(snap => {
    state.logs = snap.docs.map(d => ({
      id:        d.id,
      type:      d.data().type,
      timestamp: toDate(d.data().timestamp),
      napEnd:    toDate(d.data().napEnd) || null,
      duration:  d.data().duration || null,
      size:      d.data().size  || null,
      ml:        d.data().ml    || null,
    }));
    recoverNapState();
    computePredictions();
    render();
  });

  db.collection('settings').doc('main').onSnapshot(snap => {
    if (snap.exists) state.settings = snap.data();
    renderHeader();
  });

  db.collection('vetNotes').orderBy('date','desc').onSnapshot(snap => {
    state.vetNotes = snap.docs.map(d => ({
      id:       d.id,
      category: d.data().category,
      date:     toDate(d.data().date),
      value:    d.data().value,
      notes:    d.data().notes || '',
      nextDue:  d.data().nextDue || null,
      photo:    d.data().photo   || null,
    }));
    if (state.tab === 'vet') renderVetTab();
  });
} else {
  state.logs     = [...MOCK.logs].sort((a,b) => b.timestamp - a.timestamp);
  state.settings = { ...MOCK.settings };
  state.vetNotes = [...MOCK.vetNotes];
  try {
    const _cn = JSON.parse(localStorage.getItem('fulki_catNotes') || '{}');
    Object.entries(_cn).forEach(([cat, val]) => {
      if (typeof val === 'string' && val.trim()) _cn[cat] = [{ id: 'n' + Date.now(), text: val, date: new Date().toISOString() }];
      else if (!Array.isArray(val)) delete _cn[cat];
    });
    state.catNotes = _cn;
  } catch(e) {}
  recoverNapState();
  computePredictions();
}

// ============================================================
// D — WRITE HELPERS
// ============================================================
function addLog(type, timestamp, extra={}) {
  let ts = timestamp || new Date();
  // When logging on a past date, preserve current H:M but use viewDate's Y/M/D
  if (!timestamp && !isSameDay(state.viewDate, new Date())) {
    const now = new Date();
    ts = new Date(state.viewDate);
    ts.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), 0);
  }
  const entry = { type, timestamp: ts, ...extra };
  if (USE_MOCK) {
    const id = 'mock_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    state.logs.unshift({ id, ...entry });
    computePredictions();
    render();
    return;
  }
  const fs   = firebase.firestore;
  const data = { ...entry, timestamp: fs.Timestamp.fromDate(entry.timestamp) };
  if (entry.napEnd) data.napEnd = fs.Timestamp.fromDate(entry.napEnd);
  db.collection('logs').add(data).catch(e => showToast('⚠️ ' + e.message));
}

function deleteLog(id) {
  if (USE_MOCK) {
    state.logs = state.logs.filter(l => l.id !== id);
    if (state.napInProgress?.docId === id) state.napInProgress = null;
    computePredictions();
    render();
    return;
  }
  db.collection('logs').doc(id).delete().catch(e => showToast('⚠️ ' + e.message));
}

function updateNapEnd(id, newDate) {
  const log = state.logs.find(l => l.id === id);
  if (!log) return;
  const duration = Math.max(0, Math.round((newDate - log.timestamp) / 60000));
  if (USE_MOCK) {
    log.napEnd = newDate;
    log.duration = duration;
    computePredictions();
    render();
    return;
  }
  db.collection('logs').doc(id).update({
    napEnd:   firebase.firestore.Timestamp.fromDate(newDate),
    duration,
  }).catch(e => showToast('⚠️ ' + e.message));
}

function updateLogTime(id, newDate) {
  if (USE_MOCK) {
    const log = state.logs.find(l => l.id === id);
    if (log) log.timestamp = newDate;
    state.logs.sort((a,b) => b.timestamp - a.timestamp);
    computePredictions();
    render();
    return;
  }
  db.collection('logs').doc(id).update({ timestamp: firebase.firestore.Timestamp.fromDate(newDate) })
    .catch(e => showToast('⚠️ ' + e.message));
}

function savePuppyName(name) {
  state.settings.puppyName = name;
  if (USE_MOCK) { renderHeader(); return; }
  db.collection('settings').doc('main').set({ puppyName: name }, { merge: true })
    .catch(e => showToast('⚠️ ' + e.message));
}

function startNap() {
  const ts = new Date();
  if (USE_MOCK) {
    const id = 'nap_' + Date.now();
    state.logs.unshift({ id, type:'nap', timestamp: ts, napEnd: null, duration: null });
    state.napInProgress = { docId: id, startTime: ts };
    render();
    return;
  }
  db.collection('logs').add({
    type: 'nap',
    timestamp: firebase.firestore.Timestamp.fromDate(ts),
    napEnd: null, duration: null,
  }).then(ref => {
    state.napInProgress = { docId: ref.id, startTime: ts };
  }).catch(e => showToast('⚠️ ' + e.message));
}

function endNap() {
  const end      = new Date();
  const duration = Math.round((end - state.napInProgress.startTime) / 60000);
  if (USE_MOCK) {
    const log = state.logs.find(l => l.id === state.napInProgress.docId);
    if (log) { log.napEnd = end; log.duration = duration; }
    state.napInProgress = null;
    computePredictions();
    render();
    return;
  }
  db.collection('logs').doc(state.napInProgress.docId).update({
    napEnd: firebase.firestore.Timestamp.fromDate(end), duration,
  }).catch(e => showToast('⚠️ ' + e.message));
  state.napInProgress = null;
}

function saveVetNote(data) {
  // data.date takes precedence over the default new Date()
  const entry = { date: new Date(), ...data };
  if (USE_MOCK) {
    state.vetNotes.unshift({ id: 'vet_' + Date.now(), ...entry });
    renderVetTab();
    return;
  }
  const fsEntry = {
    ...entry,
    date: firebase.firestore.Timestamp.fromDate(
      entry.date instanceof Date ? entry.date : new Date(entry.date)
    ),
  };
  if (entry.nextDue) fsEntry.nextDue = entry.nextDue;
  db.collection('vetNotes').add(fsEntry).catch(e => showToast('⚠️ ' + e.message));
}

function deleteVetNote(id) {
  if (USE_MOCK) {
    state.vetNotes = state.vetNotes.filter(v => v.id !== id);
    renderVetTab();
    return;
  }
  db.collection('vetNotes').doc(id).delete().catch(e => showToast('⚠️ ' + e.message));
}

// E — PREDICTION ENGINE
// ============================================================
function computePredictions() {
  state.predictions = {};
  const allAsc     = [...state.logs].sort((a,b) => a.timestamp - b.timestamp);
  const napsDone   = allAsc.filter(l => l.type === 'nap' && l.napEnd);
  const lastNapEnd = napsDone.slice(-1)[0]?.napEnd || null;

  PREDICT_CATS.forEach(cat => {
    const events = allAsc.filter(l => l.type === cat).slice(-WINDOW);
    const count  = events.length;
    const conf   = Math.min(count / 20, 1);

    if (count < 2) {
      state.predictions[cat] = { conf, minutesUntil: null, source: 'log more to predict' };
      return;
    }

    const intervals = [];
    for (let i = 1; i < events.length; i++) {
      let gap = events[i].timestamp - events[i-1].timestamp;
      // For pee: subtract nap sleep time within this interval so we learn awake-time patterns
      if (cat === 'pee') {
        napsDone.forEach(nap => {
          if (nap.timestamp >= events[i-1].timestamp && nap.napEnd <= events[i].timestamp)
            gap -= (nap.napEnd - nap.timestamp);
        });
        if (gap < 0) gap = 0;
      }
      intervals.push(gap);
    }

    const weights = intervals.map((_,i) => Math.exp(-DECAY * (intervals.length - 1 - i)));
    const wSum    = weights.reduce((a,b) => a+b, 0);
    const wMean   = intervals.reduce((acc, iv, i) => acc + iv * weights[i], 0) / wSum;

    let nextMs = events[events.length - 1].timestamp.getTime() + wMean;
    let source = `${count} logs`;

    // Pee: if currently napping, push prediction forward by nap elapsed time
    // (awake-time isn't accumulating so the clock on "time to next pee" pauses)
    if (cat === 'pee' && state.napInProgress) {
      const napElapsed = Date.now() - new Date(state.napInProgress.startTime).getTime();
      nextMs += napElapsed;
      source  = 'nap-adjusted';
    }

    // Pee/poop: override with post-nap trigger when Fulki just woke up
    if ((cat === 'pee' || cat === 'poop') && lastNapEnd) {
      const delays = [];
      napsDone.forEach(nap => {
        const first = allAsc.find(x =>
          x.type === cat &&
          x.timestamp > nap.napEnd &&
          (x.timestamp - nap.napEnd) < 30 * 60000
        );
        if (first) delays.push(first.timestamp - nap.napEnd);
      });
      if (delays.length >= 2) {
        const meanDelay = delays.reduce((a,b) => a+b, 0) / delays.length;
        const triggerMs = lastNapEnd.getTime() + meanDelay;
        if (triggerMs > Date.now() || (Date.now() - triggerMs) < 5 * 60000) {
          nextMs = triggerMs;
          source = 'after nap';
        }
      }
    }

    state.predictions[cat] = { conf, minutesUntil: (nextMs - Date.now()) / 60000, source };
  });
}

function recoverNapState() {
  const active = state.logs.find(l => l.type === 'nap' && !l.napEnd);
  state.napInProgress = active
    ? { docId: active.id, startTime: active.timestamp }
    : null;
}

function getLearningStage() {
  const n = state.logs.length;
  if (!n) return { label:'Just getting started', icon:'🌱', blend:0.05 };
  const days = (Date.now() - Math.min(...state.logs.map(l => +l.timestamp))) / (24 * 3600e3);
  if (days < 1)  return { label:'Day 1 — just getting started',  icon:'🌱', blend:0.05 };
  if (days < 2)  return { label:'Day 2 — watching for patterns', icon:'👀', blend:0.12 };
  if (days < 4)  return { label:'Building your pup\'s profile',  icon:'📖', blend:0.30 };
  if (days < 7)  return { label:'Patterns starting to emerge',   icon:'📈', blend:0.55 };
  if (days < 14) return { label:'Growing more confident',        icon:'🎯', blend:0.75 };
  if (days < 30) return { label:'Reliable predictions',          icon:'⭐', blend:0.90 };
  if (days < 60) return { label:'Fully calibrated',             icon:'🎓', blend:0.98 };
  return               { label:'Expert — fully calibrated',     icon:'🏆', blend:1.0  };
}

function isDarkMode() {
  return document.body.classList.contains('dark') ||
    (!document.body.classList.contains('light') &&
     window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
}
function urgency(mins) {
  if (isDarkMode()) {
    if (mins <= 5)  return { bg:'var(--surface)', text:'#e08898', bar:'#9058a0', border:'#e08898' };
    if (mins <= 20) return { bg:'var(--surface)', text:'#60b0d8', bar:'#005c7f', border:'#60b0d8' };
    return               { bg:'var(--surface)', text:'#008780', bar:'#008780', border:'#008780' };
  }
  if (mins <= 5)  return { bg:'#FEE2E2', text:'#B91C1C', bar:'#EF4444', border:'#FCA5A5' };
  if (mins <= 20) return { bg:'#FEF9C3', text:'#854D0E', bar:'#EAB308', border:'#FDE047' };
  return               { bg:'#DCFCE7', text:'#166534', bar:'#22C55E', border:'#86EFAC' };
}

function minsLabel(m) {
  if (m <= 0) return `${Math.abs(m)}m overdue`;
  if (m < 60) return `in ${m}m`;
  const h = Math.floor(m/60), r = m%60;
  return r ? `in ${h}h ${r}m` : `in ${h}h`;
}

function elapsedMins(d) {
  return Math.floor((Date.now() - new Date(d).getTime()) / 60000);
}

function fmtDate(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? new Date(d + 'T12:00:00') : d;
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function hrLabel(h) {
  const ap = h >= 12 ? 'pm' : 'am';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}${ap}`;
}

function renderPredictions() {
  const stage    = getLearningStage();
  const stagePct = Math.round(stage.blend * 100);

  if (stagePct >= 100) {
    if (!localStorage.getItem('fulki_100pct_at')) {
      try { localStorage.setItem('fulki_100pct_at', Date.now()); } catch(e) {}
    }
  }
  const _100pctAt  = parseInt(localStorage.getItem('fulki_100pct_at') || '0', 10);
  const hideBanner = _100pctAt > 0 && (Date.now() - _100pctAt) > 24 * 3600e3;

  const stageBanner = hideBanner ? '' : `
    <div id="learning-stage">
      <span class="stage-icon">${stage.icon}</span>
      <div class="stage-body">
        <div class="stage-label">${stage.label}</div>
        <div class="stage-bar-bg">
          <div class="stage-bar-fill" style="width:${stagePct}%"></div>
        </div>
      </div>
      <div class="stage-pct">${stagePct}%</div>
    </div>`;

  const cards = PREDICT_CATS.map(cat => {
    const p = state.predictions[cat] || {};
    const c = CAT[cat];
    let timeText = 'Learning…';
    let urg = { bg:'#F5EDE3', text:'#7B5030', bar:'#C0A070', border:'#EDD5A8' };
    let pct  = Math.round((p.conf || 0) * 100);
    let isUrgent = false;

    let clockText = '', countdownText = '';
    if (p.minutesUntil !== null && p.conf >= 0.2) {
      const m      = Math.round(p.minutesUntil);
      const target = new Date(Date.now() + m * 60000);
      clockText     = target.toLocaleTimeString('en-GB', { hour:'numeric', minute:'2-digit', hour12:true }).toUpperCase();
      countdownText = m <= 0 ? 'now' : 'in ' + minsLabel(m);
      urg      = urgency(m);
      isUrgent = m <= 5;
    }

    return `<div class="pred-card${isUrgent ? ' urgent' : ''}"
      style="background:${urg.bg};border-color:${urg.border}">
      <div class="pred-emoji">${c.emoji}</div>
      <div class="pred-time" style="color:${urg.text}">${clockText || timeText}</div>
      ${countdownText ? `<div style="font-size:10px;opacity:0.7;color:${urg.text};margin-top:1px">${countdownText}</div>` : ''}
      <div class="pred-lbl" style="color:${urg.text}">${c.label}</div>
      <div class="conf-bar-wrap">
        <div class="conf-bar-bg">
          <div class="conf-bar" style="width:${pct}%;background:${urg.bar}"></div>
        </div>
        <span class="conf-pct">${pct}%</span>
      </div>
      <div class="pred-source" style="color:${urg.text}">${p.source || '—'}</div>
    </div>`;
  }).join('');

  document.getElementById('prediction-section').innerHTML =
    stageBanner +
    `<div class="section-label">Next predictions 🔮</div>` +
    `<div class="predictions-row">${cards}</div>` +
    `<div class="pred-note">Accuracy grows as more events are logged</div>`;
}

function computeStreak() {
  const days = new Set(state.logs.map(l => startOfDay(l.timestamp).getTime()));
  let streak = 0;
  const d = startOfDay(new Date());
  while (days.has(d.getTime())) { streak++; d.setDate(d.getDate()-1); }
  return streak;
}

function renderFoodPoopHeatmap() {
  const foodLogs = state.logs.filter(l=>l.type==='food').sort((a,b)=>a.timestamp-b.timestamp);
  const poopLogs = state.logs.filter(l=>l.type==='poop').sort((a,b)=>a.timestamp-b.timestamp);
  if (foodLogs.length < 1 || poopLogs.length < 1) return `<div class="corr-card"><div class="corr-title">🥩 → 💩 Food to Poop Lag</div><div style="font-size:11px;color:var(--text-4);padding:6px 0">Log food and poop to see Fulki's rhythm</div></div>`;

  const bucketLabels = ['<3h','3–6h','6–9h','9–12h','12h+'];
  const bucketMaxMs  = [3, 6, 9, 12, Infinity].map(h => h === Infinity ? Infinity : h * 3600000);

  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0,0,0,0);
    days.push(d);
  }

  const grid = days.map(() => Array(5).fill(0));
  poopLogs.forEach(poop => {
    const di = days.findIndex(d => isSameDay(d, poop.timestamp));
    if (di === -1) return;
    const lastFood = foodLogs.filter(f => f.timestamp < poop.timestamp).slice(-1)[0];
    if (!lastFood) return;
    const lag = poop.timestamp - lastFood.timestamp;
    const bi  = bucketMaxMs.findIndex(max => lag < max);
    if (bi >= 0) grid[di][bi]++;
  });

  const maxCell = Math.max(...grid.flat(), 1);
  const hdrCells = bucketLabels.map(l => `<div class="rhythm-hdr">${l}</div>`).join('');
  const rows = days.map((d, di) => {
    const lbl   = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric' });
    const cells = grid[di].map(count => {
      const op = count === 0 ? 0.07 : 0.2 + (count / maxCell) * 0.8;
      return `<div class="rhythm-cell" style="background:${CAT.poop.color};opacity:${op}">${count||''}</div>`;
    }).join('');
    return `<div class="rhythm-row"><div class="rhythm-day-lbl">${lbl}</div>${cells}</div>`;
  }).join('');

  return `<div class="corr-card">
    <div class="corr-title">🥩 → 💩 Food to Poop Lag — 14 days</div>
    <div class="rhythm-header"><div class="rhythm-day-lbl"></div>${hdrCells}</div>
    ${rows}
    <div style="font-size:9px;color:var(--text-4);margin-top:6px">Darker = more poops at that lag after eating</div>
  </div>`;
}

function renderStatsTab() {
  const tab = document.getElementById('stats-tab');
  const sel = state.selectedStatsCat || 'pee';
  const cat = CAT[sel];

  const sevenAgo   = Date.now() - 7 * 24 * 3600e3;
  const recent     = state.logs.filter(l => l.type === sel && +l.timestamp > sevenAgo);
  const allOfType  = state.logs.filter(l => l.type === sel);
  const hourCounts = Array(24).fill(0);
  const hourMls    = Array(24).fill(0);
  recent.forEach(l => {
    hourCounts[l.timestamp.getHours()]++;
    if (sel === 'water') hourMls[l.timestamp.getHours()] += (l.ml || 100);
  });
  const chartVals = sel === 'water' ? hourMls : hourCounts;
  const max = Math.max(...chartVals, 1);

  const totalLast7 = recent.length;
  const avgPerDay  = totalLast7 > 0 ? (totalLast7 / 7).toFixed(1) : '—';
  const ranked     = hourCounts.map((c,h) => ({h,c})).filter(x=>x.c>0).sort((a,b)=>b.c-a.c);
  const peaks      = ranked.slice(0, 3);
  const topHr      = peaks[0] ? hrLabel(peaks[0].h) : '—';
  const streak     = computeStreak();

  // Avg interval between consecutive events
  let avgInterval = '—';
  if (allOfType.length >= 2) {
    const sorted = [...allOfType].sort((a,b)=>a.timestamp-b.timestamp);
    const intervals = [];
    for (let i=1;i<sorted.length;i++) intervals.push(sorted[i].timestamp - sorted[i-1].timestamp);
    const mean = intervals.reduce((a,b)=>a+b,0)/intervals.length;
    const h = Math.floor(mean/3600e3), m = Math.round((mean%3600e3)/60000);
    avgInterval = h>0 ? `${h}h${m>0?m+'m':''}` : `${m}m`;
  }

  const pills = CATS.map(c => {
    const active = c.key === sel;
    const hasNote = !!(state.catNotes[c.key] || []).length;
    return `<button class="stats-pill" data-action="select-stats-cat" data-cat="${c.key}"
      style="border-color:${c.border};background:${active?c.color:c.bg};color:${active?'#fff':c.color}">
      ${c.emoji} ${c.label}${hasNote?' 📝':''}
    </button>`;
  }).join('');

  const catNotesList = state.catNotes[sel] || [];
  const noteHtml = catNotesList.length === 0 ? '' : catNotesList.map(n => {
    const nd = new Date(n.date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    return `<div style="background:${cat.bg};border:1.5px solid ${cat.border};border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:12px;color:${cat.color}">
      <div style="font-size:10px;opacity:0.7;margin-bottom:2px">${nd}</div>${n.text}
    </div>`;
  }).join('');
  const noteBtnLabel = catNotesList.length > 0 ? '📝 View / add notes' : '📝 Add note';

  const napDurations = allOfType.filter(l => l.duration).map(l => l.duration);
  const avgDurVal    = napDurations.length
    ? Math.round(napDurations.reduce((a,b)=>a+b,0)/napDurations.length) + 'm avg'
    : '—';

  const statsRow = [
    ['Last 7 days', totalLast7+'×'],
    ['Avg/day',     avgPerDay],
    ['Peak time',   topHr],
    ['Avg interval',avgInterval],
    ['Since Fulki', streak+'d'],
    ['Total logged', sel === 'nap' ? avgDurVal : allOfType.length+'×'],
  ].map(([k,v]) => `<div class="stats-stat-card">
    <div class="stats-stat-val" style="color:${cat.color}">${v}</div>
    <div class="stats-stat-lbl">${k}</div>
  </div>`).join('');

  function barCol(val, h) {
    const opacity = val === 0 ? 0.08 : 0.18 + (val / max) * 0.82;
    const label   = sel === 'water' && val > 0 ? val + 'ml' : (val > 0 ? val : '');
    const ctHtml  = val > 0 ? `<div class="chart-ct" style="color:${cat.color}">${label}</div>` : '';
    return `<div class="chart-col">
      <div class="chart-bar-wrap">
        <div class="chart-bar" style="height:100%;background:${cat.color};opacity:${opacity.toFixed(2)}"></div>
      </div>
      <div class="chart-hr-lbl">${hrLabel(h)}</div>
      ${ctHtml}
    </div>`;
  }

  const amBars = chartVals.slice(0,12).map((v,i) => barCol(v,i)).join('');
  const pmBars = chartVals.slice(12).map((v,i) => barCol(v,i+12)).join('');

  const peaksHtml = peaks.length > 0 ? `
    <div class="stats-peaks-card">
      <div class="peaks-title">Peak times for ${cat.label.toLowerCase()}</div>
      ${peaks.map(p => `
        <div class="peak-row">
          <span>${cat.emoji}</span>
          <div class="peak-bar-bg">
            <div class="peak-bar" style="width:${Math.round((p.c/peaks[0].c)*100)}%;background:${cat.color}"></div>
          </div>
          <span class="peak-hr">${hrLabel(p.h)}</span>
          <span class="peak-ct">${p.c}×</span>
        </div>`).join('')}
    </div>` : '';

  const mainContent = recent.length === 0
    ? `<div class="empty-state">No ${cat.label.toLowerCase()} events in the past 7 days yet.<br>
       <span class="sub">Patterns appear here as you log.</span></div>`
    : `<div class="chart-half-label">${sel === 'water' ? 'AM · ml per hour' : 'AM'}</div>
       <div class="chart-grid">${amBars}</div>
       <div class="chart-half-label">${sel === 'water' ? 'PM · ml per hour' : 'PM'}</div>
       <div class="chart-grid">${pmBars}</div>
       ${peaksHtml}`;

  // ── Water-specific volume section ──
  let waterSection = '';
  if (sel === 'water') {
    const dailyMls = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const dayLogs = state.logs.filter(l => l.type === 'water' && isSameDay(l.timestamp, d));
      dailyMls.push({ date: d, ml: waterMl(dayLogs) });
    }
    const avgDailyMl = Math.round(dailyMls.reduce((s, d) => s + d.ml, 0) / 7);
    const todayMl    = dailyMls[6].ml;
    const todayVsAvg = avgDailyMl > 0 ? Math.round((todayMl / avgDailyMl) * 100) : null;

    const volCards = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="stats-stat-card">
        <div class="stats-stat-val" style="color:#5B9ED6">${todayMl}ml</div>
        <div class="stats-stat-lbl">Today</div>
      </div>
      <div class="stats-stat-card">
        <div class="stats-stat-val" style="color:#5B9ED6">${avgDailyMl}ml</div>
        <div class="stats-stat-lbl">Daily avg (7d)</div>
      </div>
    </div>`;

    const maxMl = Math.max(...dailyMls.map(d => d.ml), 1);
    const bars  = dailyMls.map(d => {
      const h   = Math.max(4, Math.round((d.ml / maxMl) * 52));
      const day = d.date.toLocaleDateString('en-GB', { weekday:'short' });
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
        <div style="font-size:8px;font-family:sans-serif;color:var(--text-3);font-weight:700">${d.ml > 0 ? d.ml : ''}</div>
        <div style="height:52px;display:flex;align-items:flex-end">
          <div style="width:20px;height:${h}px;background:#5B9ED6;border-radius:4px 4px 0 0;opacity:${d.ml > 0 ? 1 : 0.2}"></div>
        </div>
        <div style="font-size:8px;font-family:sans-serif;color:var(--text-3)">${day}</div>
      </div>`;
    }).join('');
    const dailyChart = `<div class="weight-chart-wrap" style="margin-bottom:14px">
      <div class="weight-chart-title">💧 Daily intake (ml) — last 7 days</div>
      <div style="display:flex;gap:2px;align-items:flex-end">${bars}</div>
    </div>`;

    const zoomiesLogs = state.logs.filter(l => l.type === 'zoomies' && +l.timestamp > sevenAgo);
    const hydratedCount = zoomiesLogs.filter(z => {
      const window = +z.timestamp + 30 * 60000;
      return state.logs.some(w => w.type === 'water' && +w.timestamp > +z.timestamp && +w.timestamp <= window);
    }).length;
    const zoomiesCount = zoomiesLogs.length;
    const hydratedPct  = zoomiesCount > 0 ? Math.round((hydratedCount / zoomiesCount) * 100) : null;
    const allWaterMl   = state.logs.filter(l => l.type === 'water' && l.ml);
    const largestDrink = allWaterMl.length > 0 ? Math.max(...allWaterMl.map(l => l.ml)) : 0;

    const insightRows = [
      todayVsAvg !== null ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:6px">
        Today vs 7-day avg: <strong style="color:${todayVsAvg >= 90 ? '#3D8F3D' : '#D17078'}">${todayVsAvg}%</strong>
        ${todayVsAvg >= 110 ? ' 🌊 drinking well!' : todayVsAvg < 80 ? ' ⚠️ below usual' : ' ✓ on track'}
      </div>` : '',
      hydratedPct !== null ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:6px">
        Post-zoomies hydration: <strong>${hydratedPct}%</strong> (${hydratedCount}/${zoomiesCount} sessions)
        ${hydratedPct === 100 ? ' ✅' : hydratedPct >= 50 ? ' 👍' : ' 💡 try water after play!'}
      </div>` : '',
      largestDrink > 0 ? `<div style="font-size:12px;color:var(--text-3)">Biggest single drink recorded: ${largestDrink}ml</div>` : '',
    ].filter(Boolean).join('');

    const insightsCard = insightRows ? `<div class="corr-card" style="margin-bottom:14px">
      <div class="corr-title">💡 Hydration insights</div>
      ${insightRows}
    </div>` : '';

    waterSection = volCards + dailyChart + insightsCard;
  }

  tab.innerHTML = `
    <div class="section-label">Hourly patterns · past 7 days</div>
    <div class="stats-cat-pills">${pills}</div>
    ${noteHtml}
    <button class="stats-pill" data-action="notes-open" data-cat="${sel}"
      style="border-color:${cat.border};background:${cat.bg};color:${cat.color};margin-bottom:14px">
      ${noteBtnLabel}
    </button>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">${statsRow}</div>
    ${waterSection}
    ${mainContent}
    ${renderFoodPoopHeatmap()}
    <button class="export-btn" data-action="export-csv">📥 Export all logs as CSV</button>`;
}

function photoField(form) {
  return `<div class="vet-field">
    <div class="vet-field-lbl">Photo (optional)</div>
    <label class="photo-upload-btn">
      📷 ${form.photo ? 'Change photo' : 'Add photo'}
      <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleVetPhoto(this)">
    </label>
    ${form.photo ? `<img src="${form.photo}" style="width:100%;border-radius:10px;margin-top:8px;max-height:200px;object-fit:cover">` : ''}
  </div>`;
}

function handleVetPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      state.vetFormData.photo = canvas.toDataURL('image/jpeg', 0.72);
      renderVetTab();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderVetTab() {
  const tab    = document.getElementById('vet-tab');
  const vtFind = id => VET_TYPES.find(t => t.id === id) || { emoji:'📋', label: id || 'Other', color:'#7A8090' };
  const adding = state.vetFormType;
  const form   = state.vetFormData || {};
  const today  = new Date().toISOString().slice(0, 10);

  const typeButtons = VET_TYPES.filter(t => t.id !== 'other').map(t =>
    `<button class="vet-type-btn" data-action="open-vet-form" data-type="${t.id}">
      <span class="vet-type-icon">${t.emoji}</span>${t.label}
    </button>`
  ).join('');

  let extraFields = '';
  if (adding === 'weight') {
    extraFields = `<div class="vet-field">
      <div class="vet-field-lbl">Weight (kg)</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" step="0.1" min="0" class="vet-input" id="vet-value"
          placeholder="e.g. 2.4" value="${form.value||''}">

      </div>
    </div>`;
  } else if (adding === 'flea' || adding === 'vaccination') {
    extraFields = `
      <div class="vet-field">
        <div class="vet-field-lbl">${adding==='flea'?'Product name':'Vaccine name'}</div>
        <input class="vet-input" id="vet-value"
          placeholder="${adding==='flea'?'e.g. Stronghold Plus':'e.g. L4 booster'}"
          value="${form.value||''}">
      </div>
      <div class="vet-field">
        <div class="vet-field-lbl">Next due date</div>
        <input type="date" class="vet-input" id="vet-nextdue" value="${form.nextDue||''}">
      </div>`;
  } else if (adding === 'visit') {
    extraFields = `<div class="vet-field">
      <div class="vet-field-lbl">Reason / clinic</div>
      <input class="vet-input" id="vet-value"
        placeholder="e.g. checkup at City Vets" value="${form.value||''}">
    </div>${photoField(form)}`;
  } else if (adding === 'note') {
    extraFields = `<div class="vet-field">
      <div class="vet-field-lbl">Note</div>
      <textarea class="vet-input vet-textarea" id="vet-value"
        placeholder="Anything worth remembering…">${form.value||''}</textarea>
    </div>${photoField(form)}`;
  } else if (adding === 'concern') {
    extraFields = `<div class="vet-field">
      <div class="vet-field-lbl">Concern / symptom</div>
      <textarea class="vet-input vet-textarea" id="vet-value"
        placeholder="Describe what you noticed…">${form.value||''}</textarea>
    </div>${photoField(form)}`;
  }

  const editing  = !!state.vetEditingId;
  const formHtml = adding ? `
    <div class="vet-form-card">
      <div class="vet-form-title">${vtFind(adding).emoji} ${editing ? 'Edit' : 'Add'} ${vtFind(adding).label}</div>
      <div class="vet-field">
        <div class="vet-field-lbl">Date</div>
        <input type="date" class="vet-input" id="vet-date" value="${form.date||today}">
      </div>
      ${extraFields}
      <div class="vet-form-actions">
        <button class="vet-save-btn" data-action="save-vet">Save</button>
        <button class="vet-cancel-btn" data-action="cancel-vet">Cancel</button>
      </div>
    </div>` : '';

  const filterTypeIds = ['all', ...VET_TYPES.filter(t => t.id !== 'other').map(t => t.id)];
  const filterBtns = filterTypeIds.map(id => {
    const t = id === 'all' ? { emoji:'📋', label:'All', color:'#7A8090' } : vtFind(id);
    const active = state.vetFilter.type === id;
    return `<button data-action="vet-filter-type" data-type="${id}"
      style="background:${active?t.color:'var(--surface)'};color:${active?'#fff':t.color};
      border:1.5px solid ${t.color};border-radius:8px;padding:5px 10px;font-size:11px;
      font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">${t.emoji} ${t.label}</button>`;
  }).join('');

  const filterBar = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${filterBtns}</div>
    <input type="search" placeholder="🔍 Search records…" value="${state.vetFilter.search.replace(/"/g,'&quot;')}"
      oninput="state.vetFilter.search=this.value;renderVetTab()"
      style="width:100%;border:1.5px solid var(--border-2);border-radius:10px;padding:9px 12px;
      font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);
      outline:none;margin-bottom:12px;box-sizing:border-box">`;

  const filteredNotes = state.vetNotes.filter(n => {
    if (state.vetFilter.type !== 'all' && n.category !== state.vetFilter.type) return false;
    const q = state.vetFilter.search.trim().toLowerCase();
    if (!q) return true;
    return (n.value||'').toLowerCase().includes(q) || (n.notes||'').toLowerCase().includes(q);
  });

  const notesHtml = filteredNotes.length === 0
    ? `<div class="empty-state">${state.vetNotes.length === 0 ? 'No vet records yet.<br><span class="sub">Add weight checks, treatments &amp; vaccines above.</span>' : 'No records match your filter.'}</div>`
    : `<div class="vet-note-list">${filteredNotes.map(n => {
        const t       = vtFind(n.category);
        const nDate   = n.nextDue ? new Date(n.nextDue + 'T12:00:00') : null;
        const overdue = nDate && nDate < new Date();
        const dueSoon = nDate && !overdue && (nDate - Date.now()) < 7*24*3600e3;
        const cls     = overdue ? 'overdue' : dueSoon ? 'due-soon' : '';
        const ndHtml  = nDate ? `<div class="vet-note-next ${overdue?'overdue':dueSoon?'due-soon':'ok'}">
          ${overdue?'⚠️ Overdue — ':dueSoon?'⏰ Due soon — ':'Next: '}${fmtDate(n.nextDue)}
        </div>` : '';
        return `<div class="vet-note-entry ${cls}">
          <span class="vet-note-icon">${t.emoji}</span>
          <div class="vet-note-body">
            <div class="vet-note-type" style="color:${t.color}">${t.label}</div>
            <div class="vet-note-detail">
              ${(()=>{const vd=n.value&&n.category==='weight'?parseFloat(n.value)+'kg':n.value;return fmtDate(n.date)+(vd?' · '+vd:'')+(n.notes?' · '+n.notes:'');})()}
            </div>
            ${ndHtml}
            ${n.photo ? `<img src="${n.photo}" style="width:100%;border-radius:8px;margin-top:6px;max-height:160px;object-fit:cover;cursor:pointer" onclick="window.open(this.src)" title="Tap to view full size">` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
            <button class="vet-note-edit"   data-action="edit-vet"   data-id="${n.id}">✏️</button>
            <button class="vet-note-delete" data-action="delete-vet" data-id="${n.id}">×</button>
          </div>
        </div>`;
      }).join('')}</div>`;

  // Weight chart
  const weightEntries = state.vetNotes
    .filter(n => n.category === 'weight' && n.value && !isNaN(parseFloat(n.value)))
    .sort((a,b) => a.date - b.date);
  let weightChartHtml = '';
  if (weightEntries.length >= 2) {
    const vals   = weightEntries.map(n => parseFloat(n.value));
    const minV   = Math.min(...vals);
    const maxV   = Math.max(...vals);
    const range  = maxV - minV || 1;
    const W = 340, H = 80, pad = 12;
    const pts = vals.map((v,i) => {
      const x = pad + (i / (vals.length-1)) * (W - pad*2);
      const y = pad + (1 - (v-minV)/range) * (H - pad*2);
      return `${x},${y}`;
    });
    const polyline = `<polyline points="${pts.join(' ')}" fill="none" stroke="${CAT.water ? '#3A9BD5' : '#3A9BD5'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    const dots = pts.map((p,i) => {
      const [x,y] = p.split(',');
      return `<circle cx="${x}" cy="${y}" r="4" fill="#fff" stroke="#3A9BD5" stroke-width="2"/>`;
    }).join('');
    const lastVal = vals[vals.length-1];
    const diff    = vals.length >= 2 ? (lastVal - vals[vals.length-2]).toFixed(1) : null;
    const diffTxt = diff !== null ? (diff > 0 ? `+${diff}kg` : `${diff}kg`) : '';
    const diffCol = diff > 0 ? '#22C55E' : diff < 0 ? '#EF4444' : '#999';
    weightChartHtml = `<div class="weight-chart-wrap">
      <div class="weight-chart-title">⚖️ Weight over time
        ${diff !== null ? `<span style="font-size:12px;color:${diffCol};margin-left:8px">${diffTxt}</span>` : ''}
      </div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
        ${polyline}${dots}
      </svg>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:10px;color:var(--text-3)">${fmtDate(weightEntries[0].date)}</span>
        <span style="font-size:11px;font-weight:700;color:#3A9BD5">${lastVal}kg</span>
        <span style="font-size:10px;color:var(--text-3)">${fmtDate(weightEntries[weightEntries.length-1].date)}</span>
      </div>
    </div>`;
  }

  const sheetsSection = `
    <div style="margin-top:16px;background:var(--surface);border:1.5px solid var(--border-2);
      border-radius:14px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;
        letter-spacing:.8px;margin-bottom:10px">📊 Google Sheets Sync</div>
      <input type="url" placeholder="Paste Apps Script web app URL…"
        value="${(state.sheetsUrl||'').replace(/"/g,'&quot;')}"
        oninput="state.sheetsUrl=this.value;try{localStorage.setItem('fulki_sheets_url',this.value)}catch(e){}"
        style="width:100%;border:1.5px solid var(--border-2);border-radius:10px;padding:9px 12px;
        font-family:inherit;font-size:12px;color:var(--text);background:var(--bg);outline:none;
        margin-bottom:8px;box-sizing:border-box">
      <button data-action="sheets-sync" style="width:100%;background:#1a7a4a;border:none;
        border-radius:10px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;
        padding:10px;cursor:pointer">📤 Push to Google Sheets</button>
      <div style="font-size:10px;color:var(--text-4);margin-top:6px">
        First time: paste your Apps Script web app URL above
      </div>
    </div>`;

  tab.innerHTML = `
    <div class="section-label">Health &amp; Vet Records</div>
    <div class="vet-type-grid">${typeButtons}</div>
    ${weightChartHtml}
    ${formHtml}
    ${filterBar}
    ${notesHtml}
    ${sheetsSection}`;
}

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'log') {
    const type = el.dataset.type;
    if (type === 'nap') {
      if (state.napInProgress) {
        endNap();
        showToast('💤 Nap ended');
      } else {
        startNap();
        showToast('💤 Nap started');
      }
    } else if (type === 'water') {
      state.waterSizePending = true;
      document.getElementById('water-size-modal').classList.add('open');
    } else {
      addLog(type);
      showToast(`${CAT[type].emoji} ${CAT[type].label} logged`);
    }
  }

  if (action === 'water-size') {
    const size = el.dataset.size;
    const ml   = parseInt(el.dataset.ml, 10);
    addLog('water', null, { size, ml });
    showToast(`💧 Water logged (${size} · ${ml}ml)`);
    document.getElementById('water-size-modal').classList.remove('open');
    state.waterSizePending = false;
  }

  if (action === 'water-size-cancel') {
    document.getElementById('water-size-modal').classList.remove('open');
    state.waterSizePending = false;
  }

  if (action === 'walkies') {
    addLog('pee');
    addLog('poop');
    showToast('🚶 Walkies — Pee + Poop logged');
  }

  if (action === 'delete') {
    const id  = el.dataset.id;
    const log = state.logs.find(l => l.id === id);
    const lbl = log
      ? `${CAT[log.type]?.label} at ${log.timestamp.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`
      : 'this entry';
    if (confirm(`Delete ${lbl}?`)) {
      deleteLog(id);
      showToast('Deleted');
    }
  }

  if (action === 'toggle-name-edit') {
    const bar = document.getElementById('name-edit-bar');
    const inp = document.getElementById('puppy-name-input');
    const isHidden = bar.style.display !== 'flex';
    bar.style.display = isHidden ? 'flex' : 'none';
    if (isHidden && inp) {
      inp.value = state.settings.puppyName || 'Fulki';
      inp.focus(); inp.select();
    }
  }

  if (action === 'save-name') {
    const inp  = document.getElementById('puppy-name-input');
    const name = inp?.value.trim() || state.settings.puppyName;
    savePuppyName(name);
    document.getElementById('name-edit-bar').style.display = 'none';
  }

  if (action === 'tab-home')  switchTab('home');
  if (action === 'tab-stats') switchTab('stats');
  if (action === 'tab-vet')   switchTab('vet');

  if (action === 'select-stats-cat') {
    state.selectedStatsCat = el.dataset.cat;
    renderStatsTab();
  }

  if (action === 'open-vet-form') {
    state.vetFormType  = el.dataset.type;
    state.vetEditingId = null;
    state.vetFormData  = { date: new Date().toISOString().slice(0,10) };
    renderVetTab();
  }

  if (action === 'cancel-vet') {
    state.vetFormType  = null;
    state.vetEditingId = null;
    state.vetFormData  = {};
    renderVetTab();
  }

  if (action === 'vet-filter-type') {
    state.vetFilter.type = el.dataset.type;
    renderVetTab();
  }

  if (action === 'sheets-sync') pushToSheets();

  if (action === 'edit-vet') {
    const note = state.vetNotes.find(n => n.id === el.dataset.id);
    if (!note) return;
    state.vetEditingId = note.id;
    state.vetFormType  = note.category;
    state.vetFormData  = {
      date:    note.date instanceof Date ? note.date.toISOString().slice(0,10) : String(note.date).slice(0,10),
      value:   note.value   || '',
      notes:   note.notes   || '',
      nextDue: note.nextDue || '',
      photo:   note.photo   || null,
    };
    renderVetTab();
    document.getElementById('vet-date').scrollIntoView({ behavior:'smooth', block:'center' });
  }

  if (action === 'save-vet') {
    const type      = state.vetFormType;
    if (!type) return;
    const dateEl    = document.getElementById('vet-date');
    const valueEl   = document.getElementById('vet-value');
    const nextDueEl = document.getElementById('vet-nextdue');
    const dateStr   = dateEl?.value;
    const value     = valueEl?.value?.trim() || '';
    const nextDue   = nextDueEl?.value || null;
    if (!dateStr) { alert('Please enter a date.'); return; }
    const entry = {
      category: type,
      value,
      notes: '',
      date: new Date(dateStr + 'T12:00:00'),
      ...(nextDue  && { nextDue }),
      ...(state.vetFormData.photo && { photo: state.vetFormData.photo }),
    };
    if (state.vetEditingId) {
      const id = state.vetEditingId;
      if (USE_MOCK) {
        const idx = state.vetNotes.findIndex(n => n.id === id);
        if (idx > -1) state.vetNotes[idx] = { ...state.vetNotes[idx], ...entry };
        renderVetTab();
      } else {
        const fsEntry = { ...entry, date: firebase.firestore.Timestamp.fromDate(entry.date) };
        if (nextDue) fsEntry.nextDue = nextDue;
        db.collection('vetNotes').doc(id).update(fsEntry).catch(e => showToast('⚠️ ' + e.message));
      }
      showToast('Record updated');
    } else {
      saveVetNote(entry);
      showToast('Record saved');
    }
    state.vetFormType  = null;
    state.vetEditingId = null;
    state.vetFormData  = {};
  }

  if (action === 'edit-time') {
    const id   = el.dataset.id;
    const orig = new Date(parseInt(el.dataset.ts));
    const hh   = String(orig.getHours()).padStart(2,'0');
    const mm   = String(orig.getMinutes()).padStart(2,'0');
    const yyyy = orig.getFullYear();
    const mo   = String(orig.getMonth()+1).padStart(2,'0');
    const dd   = String(orig.getDate()).padStart(2,'0');

    const wrap  = document.createElement('span');
    const dInp  = Object.assign(document.createElement('input'), {
      type:'date', className:'tl-time-input', value:`${yyyy}-${mo}-${dd}`,
      style:'width:108px;margin-bottom:2px',
    });
    const tInp  = Object.assign(document.createElement('input'), {
      type:'time', className:'tl-time-input', value:`${hh}:${mm}`,
    });
    wrap.append(dInp, document.createElement('br'), tInp);
    el.replaceWith(wrap);
    tInp.focus();

    const save = () => {
      if (!tInp.value || !dInp.value) return;
      const [nh,nm] = tInp.value.split(':').map(Number);
      const nd = new Date(dInp.value + 'T12:00:00');
      nd.setHours(nh,nm,0,0);
      updateLogTime(id, nd);
    };
    tInp.addEventListener('blur',  save);
    dInp.addEventListener('change', save);
    tInp.addEventListener('keydown', ev => { if (ev.key==='Enter') tInp.blur(); });
  }

  if (action === 'edit-nap-end') {
    const id   = el.dataset.id;
    const orig = new Date(parseInt(el.dataset.ts));
    const hh   = String(orig.getHours()).padStart(2,'0');
    const mm   = String(orig.getMinutes()).padStart(2,'0');
    const yyyy = orig.getFullYear();
    const mo   = String(orig.getMonth()+1).padStart(2,'0');
    const dd   = String(orig.getDate()).padStart(2,'0');
    const wrap = document.createElement('span');
    const dInp = Object.assign(document.createElement('input'), {
      type:'date', className:'tl-time-input', value:`${yyyy}-${mo}-${dd}`,
      style:'width:108px;margin-bottom:2px',
    });
    const tInp = Object.assign(document.createElement('input'), {
      type:'time', className:'tl-time-input', value:`${hh}:${mm}`,
    });
    wrap.append(dInp, document.createElement('br'), tInp);
    el.replaceWith(wrap);
    tInp.focus();
    const save = () => {
      if (!tInp.value || !dInp.value) return;
      const [nh,nm] = tInp.value.split(':').map(Number);
      const nd = new Date(dInp.value + 'T12:00:00');
      nd.setHours(nh,nm,0,0);
      updateNapEnd(id, nd);
    };
    tInp.addEventListener('blur',  save);
    dInp.addEventListener('change', save);
    tInp.addEventListener('keydown', ev => { if (ev.key==='Enter') tInp.blur(); });
  }

  if (action === 'date-prev') {
    const d = new Date(state.viewDate);
    d.setDate(d.getDate() - 1);
    state.viewDate = d;
    render();
  }

  if (action === 'date-next') {
    const today = new Date();
    if (!isSameDay(state.viewDate, today)) {
      const d = new Date(state.viewDate);
      d.setDate(d.getDate() + 1);
      state.viewDate = d;
      render();
    }
  }

  if (action === 'date-today') {
    state.viewDate = new Date();
    render();
  }

  if (action === 'date-pick') {
    const inp = document.getElementById('date-picker-input');
    if (!inp) return;
    const d = state.viewDate;
    inp.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    inp.max   = new Date().toISOString().slice(0,10);
    inp.onchange = () => {
      if (inp.value) { state.viewDate = new Date(inp.value + 'T12:00:00'); render(); }
    };
    inp.click();
  }

  if (action === 'notes-open') {
    const cat     = el.dataset.cat;
    const catInfo = CAT[cat];
    state.activeCatNote = cat;
    document.getElementById('notes-modal-title').textContent = `${catInfo.emoji} ${catInfo.label} — Notes`;
    document.getElementById('notes-textarea').value = '';
    renderNotesList(cat);
    document.getElementById('notes-modal').classList.add('open');
  }

  if (action === 'notes-cancel') {
    document.getElementById('notes-modal').classList.remove('open');
    state.activeCatNote = null;
  }

  if (action === 'notes-save') {
    const cat  = state.activeCatNote;
    const text = document.getElementById('notes-textarea').value.trim();
    if (cat && text) {
      if (!state.catNotes[cat]) state.catNotes[cat] = [];
      state.catNotes[cat].unshift({ id: 'n' + Date.now(), text, date: new Date().toISOString() });
      try { localStorage.setItem('fulki_catNotes', JSON.stringify(state.catNotes)); } catch(e){}
      document.getElementById('notes-textarea').value = '';
      renderNotesList(cat);
      showToast('Note added');
      if (state.tab === 'stats') renderStatsTab();
    }
  }

  if (action === 'notes-delete') {
    const cat = state.activeCatNote;
    const id  = el.dataset.id;
    if (cat && id) {
      state.catNotes[cat] = (state.catNotes[cat] || []).filter(n => n.id !== id);
      if (!state.catNotes[cat].length) delete state.catNotes[cat];
      try { localStorage.setItem('fulki_catNotes', JSON.stringify(state.catNotes)); } catch(e){}
      renderNotesList(cat);
      if (state.tab === 'stats') renderStatsTab();
    }
  }

  if (action === 'notes-edit') {
    const cat  = state.activeCatNote;
    const id   = el.dataset.id;
    const note = (state.catNotes[cat] || []).find(n => n.id === id);
    if (!note) return;
    document.getElementById('notes-textarea').value = note.text;
    state.catNotes[cat] = (state.catNotes[cat] || []).filter(n => n.id !== id);
    renderNotesList(cat);
  }

  if (action === 'toggle-a11y') {
    const on = document.body.classList.toggle('a11y');
    document.getElementById('a11y-btn').classList.toggle('on', on);
    try { localStorage.setItem('fulki_a11y', on ? '1' : '0'); } catch(e){}
  }

  if (action === 'toggle-dark') {
    const goingDark = !document.body.classList.contains('dark');
    document.body.classList.toggle('dark', goingDark);
    document.body.classList.toggle('light', !goingDark);
    document.getElementById('dark-btn').textContent = goingDark ? '☀️' : '🌙';
    try { localStorage.setItem('fulki_dark', goingDark ? '1' : '0'); } catch(e){}
    render();
  }

  if (action === 'delete-vet') {
    if (confirm('Delete this record?')) {
      deleteVetNote(el.dataset.id);
      showToast('Deleted');
    }
  }
});

// Also handle Enter in name input
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.id === 'puppy-name-input') {
    document.querySelector('[data-action="save-name"]')?.click();
  }
});

// ============================================================
// H — UTILITIES
// ============================================================
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`${tab}-tab`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-action="tab-${tab}"]`).classList.add('active');
  if (tab === 'stats') renderStatsTab();
  if (tab === 'vet')   renderVetTab();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

function pushToSheets() {
  const url = state.sheetsUrl;
  if (!url) { showToast('⚠️ Paste your Apps Script URL first'); return; }
  showToast('📊 Syncing to Sheets…');
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      logs: state.logs.map(l => ({
        timestamp: l.timestamp.toISOString(),
        type: l.type, size: l.size||null, ml: l.ml||null, duration: l.duration||null,
      })),
      vetNotes: state.vetNotes.map(n => ({
        date: n.date ? new Date(n.date).toISOString() : null,
        category: n.category, value: n.value||'', notes: n.notes||'', nextDue: n.nextDue||'',
      })),
    }),
  })
  .then(r => r.json())
  .then(r => showToast(r.ok ? '✅ Google Sheets updated!' : '⚠️ ' + (r.error||'Unknown error')))
  .catch(e => showToast('⚠️ ' + e.message));
}

function renderNotesList(cat) {
  const list  = document.getElementById('notes-list');
  if (!list) return;
  const notes = state.catNotes[cat] || [];
  if (notes.length === 0) {
    list.innerHTML = '<div style="color:var(--text-3);font-size:12px;text-align:center;padding:10px">No notes yet — add one below</div>';
    return;
  }
  list.innerHTML = notes.map(n => {
    const ds = new Date(n.date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px">
      <div style="font-size:10px;color:var(--text-3);margin-bottom:3px">${ds}</div>
      <div style="font-size:13px;color:var(--text);white-space:pre-wrap">${n.text}</div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button style="font-size:11px;padding:3px 8px;border:1px solid var(--border-2);border-radius:6px;background:var(--bg);color:var(--text-2);cursor:pointer;font-family:inherit"
          data-action="notes-edit" data-id="${n.id}">✏️ Edit</button>
        <button style="font-size:11px;padding:3px 8px;border:1px solid #F0C0D0;border-radius:6px;background:#FDE8EE;color:#B04F6C;cursor:pointer;font-family:inherit"
          data-action="notes-delete" data-id="${n.id}">× Delete</button>
      </div>
    </div>`;
  }).join('');
}

// Refresh predictions + nap elapsed timer every 30s
setInterval(() => {
  computePredictions();
  renderPredictions();
  if (state.napInProgress) renderLogButtons();
}, 30000);

// ── Initial render ──
state.sheetsUrl = localStorage.getItem('fulki_sheets_url') || '';
if (localStorage.getItem('fulki_a11y') === '1') {
  document.body.classList.add('a11y');
  document.getElementById('a11y-btn')?.classList.add('on');
}
(function() {
  const saved = localStorage.getItem('fulki_dark');
  const sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved === '1' || (saved === null && sysDark);
  if (isDark) {
    document.body.classList.add('dark');
    const btn = document.getElementById('dark-btn');
    if (btn) btn.textContent = '☀️';
  } else {
    document.body.classList.add('light');
  }
}());
render();

// ── PWA Service Worker ──
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'fulki-v1';
    const URLS  = [self.location.pathname];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting()));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
