        <input class="vet-input" id="vet-value"
          placeholder="${adding==='flea'?'e.g. Stronghold Plus':'e.g. L4 booster'}"
          value="${form.value||''}">
      </div>
      <div class="vet-field">
        <div class="vet-field-lbl">Next due date</div>
        <input type="date" class="vet-input" id="vet-nextdue" value="${form.nextDue||''}">
      </div>`;
  } else if (adding === 'visit') {
    extraFields = `<div class="vet-field">
      <div class="vet-field-lbl">Reason / clinic</div>
      <input class="vet-input" id="vet-value"
        placeholder="e.g. checkup at City Vets" value="${form.value||''}">
    </div>${photoField(form)}`;
  } else if (adding === 'note') {
    extraFields = `<div class="vet-field">
      <div class="vet-field-lbl">Note</div>
      <textarea class="vet-input vet-textarea" id="vet-value"
        placeholder="Anything worth remembering…">${form.value||''}</textarea>
    </div>${photoField(form)}`;
  } else if (adding === 'concern') {
    extraFields = `<div class="vet-field">
      <div class="vet-field-lbl">Concern / symptom</div>
      <textarea class="vet-input vet-textarea" id="vet-value"
        placeholder="Describe what you noticed…">${form.value||''}</textarea>
    </div>${photoField(form)}`;
  }

  const editing  = !!state.vetEditingId;
  const formHtml = adding ? `
    <div class="vet-form-card">
      <div class="vet-form-title">${vtFind(adding).emoji} ${editing ? 'Edit' : 'Add'} ${vtFind(adding).label}</div>
      <div class="vet-field">
        <div class="vet-field-lbl">Date</div>
        <input type="date" class="vet-input" id="vet-date" value="${form.date||today}">
      </div>
      ${extraFields}
      <div class="vet-form-actions">
        <button class="vet-save-btn" data-action="save-vet">Save</button>
        <button class="vet-cancel-btn" data-action="cancel-vet">Cancel</button>
      </div>
    </div>` : '';

  const filterTypeIds = ['all', ...VET_TYPES.filter(t => t.id !== 'other').map(t => t.id)];
  const filterBtns = filterTypeIds.map(id => {
    const t = id === 'all' ? { emoji:'📋', label:'All', color:'#7A8090' } : vtFind(id);
    const active = state.vetFilter.type === id;
    return `<button data-action="vet-filter-type" data-type="${id}"
      style="background:${active?t.color:'var(--surface)'};color:${active?'#fff':t.color};
      border:1.5px solid ${t.color};border-radius:8px;padding:5px 10px;font-size:11px;
      font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">${t.emoji} ${t.label}</button>`;
  }).join('');

  const filterBar = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${filterBtns}</div>
    <input type="search" placeholder="🔍 Search records…" value="${state.vetFilter.search.replace(/"/g,'&quot;')}"
      oninput="state.vetFilter.search=this.value;renderVetTab()"
      style="width:100%;border:1.5px solid var(--border-2);border-radius:10px;padding:9px 12px;
      font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);
      outline:none;margin-bottom:12px;box-sizing:border-box">`;

  const filteredNotes = state.vetNotes.filter(n => {
    if (state.vetFilter.type !== 'all' && n.category !== state.vetFilter.type) return false;
    const q = state.vetFilter.search.trim().toLowerCase();
    if (!q) return true;
    return (n.value||'').toLowerCase().includes(q) || (n.notes||'').toLowerCase().includes(q);
  });

  const notesHtml = filteredNotes.length === 0
    ? `<div class="empty-state">${state.vetNotes.length === 0 ? 'No vet records yet.<br><span class="sub">Add weight checks, treatments &amp; vaccines above.</span>' : 'No records match your filter.'}</div>`
    : `<div class="vet-note-list">${filteredNotes.map(n => {
        const t       = vtFind(n.category);
        const nDate   = n.nextDue ? new Date(n.nextDue + 'T12:00:00') : null;
        const overdue = nDate && nDate < new Date();
        const dueSoon = nDate && !overdue && (nDate - Date.now()) < 7*24*3600e3;
        const cls     = overdue ? 'overdue' : dueSoon ? 'due-soon' : '';
        const ndHtml  = nDate ? `<div class="vet-note-next ${overdue?'overdue':dueSoon?'due-soon':'ok'}">
          ${overdue?'⚠️ Overdue — ':dueSoon?'⏰ Due soon — ':'Next: '}${fmtDate(n.nextDue)}
        </div>` : '';
        return `<div class="vet-note-entry ${cls}">
          <span class="vet-note-icon">${t.emoji}</span>
          <div class="vet-note-body">
            <div class="vet-note-type" style="color:${t.color}">${t.label}</div>
            <div class="vet-note-detail">
              ${(()=>{const vd=n.value&&n.category==='weight'?parseFloat(n.value)+'kg':n.value;return fmtDate(n.date)+(vd?' · '+vd.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>'):'');})()}
            </div>
            ${n.notes ? `<div style="font-size:12px;color:var(--text-2);margin-top:4px;line-height:1.55;white-space:pre-wrap">${n.notes.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>` : ''}
            ${ndHtml}
            ${n.photo ? `<img src="${n.photo}" style="width:100%;border-radius:8px;margin-top:6px;max-height:160px;object-fit:cover;cursor:pointer" onclick="window.open(this.src)" title="Tap to view full size">` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
            <button class="vet-note-edit"   data-action="edit-vet"   data-id="${n.id}">✏️</button>
            <button class="vet-note-delete" data-action="delete-vet" data-id="${n.id}">×</button>

        </div>`;
      }).join('')}</div>`;

  // Weight chart
  const weightEntries = state.vetNotes
    .filter(n => n.category === 'weight' && n.value && !isNaN(parseFloat(n.value)))
    .sort((a,b) => a.date - b.date);
  let weightChartHtml = '';
  if (weightEntries.length >= 2) {
    const vals   = weightEntries.map(n => parseFloat(n.value));
    const minV   = Math.min(...vals);
    const maxV   = Math.max(...vals);
    const range  = maxV - minV || 1;
    const W = 340, H = 80, pad = 12;
    const pts = vals.map((v,i) => {
      const x = pad + (i / (vals.length-1)) * (W - pad*2);
      const y = pad + (1 - (v-minV)/range) * (H - pad*2);
      return `${x},${y}`;
    });
    const polyline = `<polyline points="${pts.join(' ')}" fill="none" stroke="${CAT.water ? '#3A9BD5' : '#3A9BD5'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    const dots = pts.map((p,i) => {
      const [x,y] = p.split(',');
      return `<circle cx="${x}" cy="${y}" r="4" fill="#fff" stroke="#3A9BD5" stroke-width="2"/>`;
    }).join('');
    const lastVal = vals[vals.length-1];
    const diff    = vals.length >= 2 ? (lastVal - vals[vals.length-2]).toFixed(1) : null;
    const diffTxt = diff !== null ? (diff > 0 ? `+${diff}kg` : `${diff}kg`) : '';
    const diffCol = diff > 0 ? '#22C55E' : diff < 0 ? '#EF4444' : '#999';
    weightChartHtml = `<div class="weight-chart-wrap">
      <div class="weight-chart-title">⚖️ Weight over time
        ${diff !== null ? `<span style="font-size:12px;color:${diffCol};margin-left:8px">${diffTxt}</span>` : ''}
      </div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
        ${polyline}${dots}
      </svg>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:10px;color:var(--text-3)">${fmtDate(weightEntries[0].date)}</span>
        <span style="font-size:11px;font-weight:700;color:#3A9BD5">${lastVal}kg</span>
        <span style="font-size:10px;color:var(--text-3)">${fmtDate(weightEntries[weightEntries.length-1].date)}</span>
      </div>
    </div>`;
  }

  tab.innerHTML = `
    <div class="section-label">Health &amp; Vet Records</div>
    <a href="tel:01732353668" style="display:flex;align-items:center;justify-content:center;gap:10px;

      font-size:16px;font-weight:700;margin-bottom:16px;min-height:56px;letter-spacing:0.3px">

    ${weightChartHtml}
    ${formHtml}
    ${filterBar}
    ${notesHtml}`;
}

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'log') {
    const type = el.dataset.type;
    if (type === 'nap') {
      if (state.napInProgress) {
        endNap(); showToast('💤 Nap ended'); render();
      } else if (state.sleepInProgress) {
        endSleep();
        showToast('☀️ Woke up!');
        render();
        document.getElementById('nap-type-modal').classList.add('open');
      } else {
        document.getElementById('nap-type-modal').classList.add('open');
      }
    } else if (type === 'water') {
      state.waterSizePending = true;
      document.getElementById('water-size-modal').classList.add('open');
    } else if (type === 'food') {
      state.foodTypePending = true;
      document.getElementById('food-size-modal').classList.add('open');
    } else if (type === 'zoomies') {
      if (state.playInProgress) { endPlay(); showToast('🎾 Play ended'); }
      else { document.getElementById('play-type-modal').classList.add('open'); }
    } else {
      addLog(type);
      showToast(`${CAT[type].emoji} ${CAT[type].label} logged`);
    }
  }

  if (action === 'end-sleep') {
    if (state.sleepInProgress) {
      endSleep();
      showToast('☀️ Good morning!');
      render();
    }
  }

  if (action === 'water-size') {
    const size = el.dataset.size;
    const ml   = parseInt(el.dataset.ml, 10);
    addLog('water', null, { size, ml });
    showToast(`💧 Water logged (${size} · ${ml}ml)`);
    document.getElementById('water-size-modal').classList.remove('open');
    state.waterSizePending = false;
  }

  if (action === 'water-size-cancel') {
    document.getElementById('water-size-modal').classList.remove('open');
    state.waterSizePending = false;
  }

  if (action === 'food-type') {
    const portion = el.dataset.portion;
    const grams   = parseInt(el.dataset.grams, 10);
    addLog('food', null, { portion, grams });
    showToast(`🥩 ${portion} logged (${grams}g)`);
    document.getElementById('food-size-modal').classList.remove('open');
    state.foodTypePending = false;
  }

  if (action === 'food-type-cancel') {
    document.getElementById('food-size-modal').classList.remove('open');
    state.foodTypePending = false;
  }

  if (action === 'nap-type') {
    const napOrSleep = el.dataset.type;
    document.getElementById('nap-type-modal').classList.remove('open');
    if (napOrSleep === 'sleep') { startSleep(); showToast('🌙 Sleep started'); }
    else { startNap(); showToast('💤 Nap started'); }
  }

  if (action === 'nap-type-cancel') {
    document.getElementById('nap-type-modal').classList.remove('open');
  }

  if (action === 'play-type') {
    document.getElementById('play-type-modal').classList.remove('open');
    if (el.dataset.type === 'zoomies') {
      addLog('zoomies', null, { instant: true });
      showToast('🌀 Zoomies logged');
    } else {
      startPlay(); showToast('🎾 Play started');
    }
  }

  if (action === 'play-type-cancel') {
    document.getElementById('play-type-modal').classList.remove('open');
  }

  if (action === 'walkies') {
    addLog('pee');
    addLog('poop');
    showToast('🚶 Walkies — Pee + Poop logged');
  }

  if (action === 'delete') {
    const id  = el.dataset.id;
    const log = state.logs.find(l => l.id === id);
    const lbl = log
      ? `${CAT[log.type]?.label} at ${log.timestamp.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`
      : 'this entry';
    if (confirm(`Delete ${lbl}?`)) {
      deleteLog(id);
      showToast('Deleted');
    }
  }

  if (action === 'toggle-name-edit') {
    const bar = document.getElementById('name-edit-bar');
    const inp = document.getElementById('puppy-name-input');
    const isHidden = bar.style.display !== 'flex';
    bar.style.display = isHidden ? 'flex' : 'none';
    if (isHidden && inp) {
      inp.value = state.settings.puppyName || 'Fulki';
      inp.focus(); inp.select();
    }
  }

  if (action === 'save-name') {
    const inp  = document.getElementById('puppy-name-input');
    const name = inp?.value.trim() || state.settings.puppyName;
    savePuppyName(name);
    document.getElementById('name-edit-bar').style.display = 'none';
  }

  if (action === 'tab-home')  switchTab('home');
  if (action === 'tab-stats') switchTab('stats');
  if (action === 'tab-vet')   switchTab('vet');

  if (action === 'select-stats-cat') {
    state.selectedStatsCat = el.dataset.cat;
    renderStatsTab();
  }

  if (action === 'open-vet-form') {
    state.vetFormType  = el.dataset.type;
    state.vetEditingId = null;
    state.vetFormData  = { date: new Date().toISOString().slice(0,10) };
    renderVetTab();
  }

  if (action === 'cancel-vet') {
    state.vetFormType  = null;
    state.vetEditingId = null;
    state.vetFormData  = {};
    renderVetTab();
  }

  if (action === 'vet-filter-type') {
    state.vetFilter.type = el.dataset.type;
    renderVetTab();
  }

  if (action === 'chart-mode') {
    state.statsChartMode = el.dataset.mode;
    renderStatsTab();
  }

  if (action === 'line-toggle') {
    const cat = el.dataset.cat;
    state.lineHidden.has(cat) ? state.lineHidden.delete(cat) : state.lineHidden.add(cat);
    renderStatsTab();
  }

  if (action === 'heatmap-prev') {
    state.heatmapOffset = (state.heatmapOffset || 0) + 1;
    renderStatsTab();
  }
  if (action === 'heatmap-next') {
    state.heatmapOffset = Math.max(0, (state.heatmapOffset || 0) - 1);
    renderStatsTab();
  }

  if (action === 'edit-vet') {
    const note = state.vetNotes.find(n => n.id === el.dataset.id);
    if (!note) return;
    state.vetEditingId = note.id;
    state.vetFormType  = note.category;
    state.vetFormData  = {
      date:    note.date instanceof Date ? note.date.toISOString().slice(0,10) : String(note.date).slice(0,10),
      value:   note.value   || '',
      notes:   note.notes   || '',
      nextDue: note.nextDue || '',
      photo:   note.photo   || null,
    };
    renderVetTab();
    document.getElementById('vet-date').scrollIntoView({ behavior:'smooth', block:'center' });
  }

  if (action === 'save-vet') {
    const type      = state.vetFormType;
    if (!type) return;
    const dateEl    = document.getElementById('vet-date');
    const valueEl   = document.getElementById('vet-value');
    const nextDueEl = document.getElementById('vet-nextdue');
    const dateStr   = dateEl?.value;
    const value     = valueEl?.value?.trim() || '';
    const nextDue   = nextDueEl?.value || null;
    if (!dateStr) { alert('Please enter a date.'); return; }
    const entry = {
      category: type,
      value,
      notes: '',
      date: new Date(dateStr + 'T12:00:00'),
      ...(nextDue  && { nextDue }),
      ...(state.vetFormData.photo && { photo: state.vetFormData.photo }),
    };
    if (state.vetEditingId) {
      const id = state.vetEditingId;
      if (USE_MOCK) {
        const idx = state.vetNotes.findIndex(n => n.id === id);
        if (idx > -1) state.vetNotes[idx] = { ...state.vetNotes[idx], ...entry };
        renderVetTab();
      } else {
        const fsEntry = { ...entry, date: firebase.firestore.Timestamp.fromDate(entry.date) };
        if (nextDue) fsEntry.nextDue = nextDue;
        db.collection('vetNotes').doc(id).update(fsEntry).catch(e => showToast('⚠️ ' + e.message));
      }
      showToast('Record updated');
    } else {
      saveVetNote(entry);
      showToast('Record saved');
    }
    state.vetFormType  = null;
    state.vetEditingId = null;
    state.vetFormData  = {};
  }

  if (action === 'edit-time') {
    const id   = el.dataset.id;
    const orig = new Date(parseInt(el.dataset.ts));
    const hh   = String(orig.getHours()).padStart(2,'0');
    const mm   = String(orig.getMinutes()).padStart(2,'0');
    const yyyy = orig.getFullYear();
    const mo   = String(orig.getMonth()+1).padStart(2,'0');
    const dd   = String(orig.getDate()).padStart(2,'0');

    const wrap  = document.createElement('span');
    const dInp  = Object.assign(document.createElement('input'), {
      type:'date', className:'tl-time-input', value:`${yyyy}-${mo}-${dd}`,
      style:'width:108px;margin-bottom:2px',
    });
    const tInp  = Object.assign(document.createElement('input'), {
      type:'time', className:'tl-time-input', value:`${hh}:${mm}`,
    });
    wrap.append(dInp, document.createElement('br'), tInp);
    el.replaceWith(wrap);
    tInp.focus();

    const save = () => {
      if (!tInp.value || !dInp.value) return;
      const [nh,nm] = tInp.value.split(':').map(Number);
      const nd = new Date(dInp.value + 'T12:00:00');
      nd.setHours(nh,nm,0,0);
      updateLogTime(id, nd);
    };
    tInp.addEventListener('blur',  save);
    dInp.addEventListener('change', save);
    tInp.addEventListener('keydown', ev => { if (ev.key==='Enter') tInp.blur(); });
  }

  if (action === 'edit-nap-end') {
    const id   = el.dataset.id;
    const orig = new Date(parseInt(el.dataset.ts));
    const hh   = String(orig.getHours()).padStart(2,'0');
    const mm   = String(orig.getMinutes()).padStart(2,'0');
    const yyyy = orig.getFullYear();
    const mo   = String(orig.getMonth()+1).padStart(2,'0');
    const dd   = String(orig.getDate()).padStart(2,'0');
    const wrap = document.createElement('span');
    const dInp = Object.assign(document.createElement('input'), {
      type:'date', className:'tl-time-input', value:`${yyyy}-${mo}-${dd}`,
      style:'width:108px;margin-bottom:2px',
    });
    const tInp = Object.assign(document.createElement('input'), {
      type:'time', className:'tl-time-input', value:`${hh}:${mm}`,
    });
    wrap.append(dInp, document.createElement('br'), tInp);
    el.replaceWith(wrap);
    tInp.focus();
    const save = () => {
      if (!tInp.value || !dInp.value) return;
      const [nh,nm] = tInp.value.split(':').map(Number);
      const nd = new Date(dInp.value + 'T12:00:00');
      nd.setHours(nh,nm,0,0);
      updateNapEnd(id, nd);
    };
    tInp.addEventListener('blur',  save);
    dInp.addEventListener('change', save);
    tInp.addEventListener('keydown', ev => { if (ev.key==='Enter') tInp.blur(); });
  }

  if (action === 'edit-play-end') {
    const id   = el.dataset.id;
    const log  = state.logs.find(l => l.id === id);
    if (!log || !log.playEnd) return;
    const orig = new Date(log.playEnd);
    const hh   = String(orig.getHours()).padStart(2,'0');
    const mm   = String(orig.getMinutes()).padStart(2,'0');
    const yyyy = orig.getFullYear();
    const mo   = String(orig.getMonth()+1).padStart(2,'0');
    const dd   = String(orig.getDate()).padStart(2,'0');
    const wrap = document.createElement('span');
    const dInp = Object.assign(document.createElement('input'), {
      type:'date', className:'tl-time-input', value:`${yyyy}-${mo}-${dd}`,
      style:'width:108px;margin-bottom:2px',
    });
    const tInp = Object.assign(document.createElement('input'), {
      type:'time', className:'tl-time-input', value:`${hh}:${mm}`,
    });
    wrap.append(dInp, document.createElement('br'), tInp);
    el.replaceWith(wrap);
    tInp.focus();
    const savePlay = () => {
      if (!tInp.value || !dInp.value) return;
      const [nh,nm] = tInp.value.split(':').map(Number);
      const nd = new Date(dInp.value + 'T12:00:00');
      nd.setHours(nh,nm,0,0);
      updatePlayEnd(id, nd);
    };
    tInp.addEventListener('blur',   savePlay);
    dInp.addEventListener('change', savePlay);
    tInp.addEventListener('keydown', ev => { if (ev.key==='Enter') tInp.blur(); });
  }

  if (action === 'edit-sleep-end') {
    const id   = el.dataset.id;
    const log  = state.logs.find(l => l.id === id);
    if (!log) return;
    const orig = new Date(parseInt(el.dataset.ts));
    const hh   = String(orig.getHours()).padStart(2,'0');
    const mm   = String(orig.getMinutes()).padStart(2,'0');
    const yyyy = orig.getFullYear();
    const mo   = String(orig.getMonth()+1).padStart(2,'0');
    const dd   = String(orig.getDate()).padStart(2,'0');
    const wrap = document.createElement('span');
    const dInp = Object.assign(document.createElement('input'), {
      type:'date', className:'tl-time-input', value:`${yyyy}-${mo}-${dd}`,
      style:'width:108px;margin-bottom:2px',
    });
    const tInp = Object.assign(document.createElement('input'), {
      type:'time', className:'tl-time-input', value:`${hh}:${mm}`,
    });
    wrap.append(dInp, document.createElement('br'), tInp);
    el.replaceWith(wrap);
    tInp.focus();
    const saveSleep = () => {
      if (!tInp.value || !dInp.value) return;
      const [nh,nm] = tInp.value.split(':').map(Number);
      const nd = new Date(dInp.value + 'T12:00:00');
      nd.setHours(nh,nm,0,0);
      updateSleepEnd(id, nd);
    };
    tInp.addEventListener('blur',   saveSleep);
    dInp.addEventListener('change', saveSleep);
    tInp.addEventListener('keydown', ev => { if (ev.key==='Enter') tInp.blur(); });
  }

  if (action === 'date-prev') {
    const d = new Date(state.viewDate);
    d.setDate(d.getDate() - 1);
    state.viewDate = d;
    render();
  }

  if (action === 'date-next') {
    const today = new Date();
    if (!isSameDay(state.viewDate, today)) {
      const d = new Date(state.viewDate);
      d.setDate(d.getDate() + 1);
      state.viewDate = d;
      render();
    }
  }

  if (action === 'date-today') {
    state.viewDate = new Date();
    render();
  }

  if (action === 'date-pick') {
    const inp = document.getElementById('date-picker-input');
    if (!inp) return;
    const d = state.viewDate;
    inp.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    inp.max   = new Date().toISOString().slice(0,10);
    inp.onchange = () => {
      if (inp.value) { state.viewDate = new Date(inp.value + 'T12:00:00'); render(); }
    };
    inp.click();
  }

  if (action === 'notes-open') {
    const cat     = el.dataset.cat;
    const catInfo = CAT[cat];
    state.activeCatNote = cat;
    document.getElementById('notes-modal-title').textContent = `${catInfo.emoji} ${catInfo.label} — Notes`;
    document.getElementById('notes-textarea').value = '';
    renderNotesList(cat);
    document.getElementById('notes-modal').classList.add('open');
  }

  if (action === 'notes-cancel') {
    document.getElementById('notes-modal').classList.remove('open');
    state.activeCatNote = null;
  }

  if (action === 'notes-save') {
    const cat  = state.activeCatNote;
    const text = document.getElementById('notes-textarea').value.trim();
    if (cat && text) {
      if (!state.catNotes[cat]) state.catNotes[cat] = [];
      state.catNotes[cat].unshift({ id: 'n' + Date.now(), text, date: new Date().toISOString() });
      try { localStorage.setItem('fulki_catNotes', JSON.stringify(state.catNotes)); } catch(e){}
      document.getElementById('notes-textarea').value = '';
      renderNotesList(cat);
      showToast('Note added');
      if (state.tab === 'stats') renderStatsTab();
    }
  }

  if (action === 'notes-delete') {
    const cat = state.activeCatNote;
    const id  = el.dataset.id;
    if (cat && id) {
      state.catNotes[cat] = (state.catNotes[cat] || []).filter(n => n.id !== id);
      if (!state.catNotes[cat].length) delete state.catNotes[cat];
      try { localStorage.setItem('fulki_catNotes', JSON.stringify(state.catNotes)); } catch(e){}
      renderNotesList(cat);
      if (state.tab === 'stats') renderStatsTab();
    }
  }

  if (action === 'notes-edit') {
    const cat  = state.activeCatNote;
    const id   = el.dataset.id;
    const note = (state.catNotes[cat] || []).find(n => n.id === id);
    if (!note) return;
    document.getElementById('notes-textarea').value = note.text;
    state.catNotes[cat] = (state.catNotes[cat] || []).filter(n => n.id !== id);
    renderNotesList(cat);
  }

  if (action === 'toggle-a11y') {
    const on = document.body.classList.toggle('a11y');
    document.getElementById('a11y-btn').classList.toggle('on', on);
    try { localStorage.setItem('fulki_a11y', on ? '1' : '0'); } catch(e){}
  }

  if (action === 'toggle-dark') {
    const goingDark = !document.body.classList.contains('dark');
    document.body.classList.toggle('dark', goingDark);
    document.body.classList.toggle('light', !goingDark);
    document.getElementById('dark-btn').textContent = goingDark ? '☀️' : '🌙';
    try { localStorage.setItem('fulki_dark', goingDark ? '1' : '0'); } catch(e){}
    render();
  }

  if (action === 'delete-vet') {
    if (confirm('Delete this record?')) {
      deleteVetNote(el.dataset.id);
      showToast('Deleted');
    }
  }
});

// Also handle Enter in name input
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.id === 'puppy-name-input') {
    document.querySelector('[data-action="save-name"]')?.click();
  }
});

// ============================================================
// H — UTILITIES
// ============================================================
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`${tab}-tab`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-action="tab-${tab}"]`).classList.add('active');
  if (tab === 'stats') renderStatsTab();
  if (tab === 'vet')   renderVetTab();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}


function renderNotesList(cat) {
  const list  = document.getElementById('notes-list');
  if (!list) return;
  const notes = state.catNotes[cat] || [];
  if (notes.length === 0) {
    list.innerHTML = '<div style="color:var(--text-3);font-size:12px;text-align:center;padding:10px">No notes yet — add one below</div>';
    return;
  }
  list.innerHTML = notes.map(n => {
    const ds = new Date(n.date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px">
      <div style="font-size:10px;color:var(--text-3);margin-bottom:3px">${ds}</div>
      <div style="font-size:13px;color:var(--text);white-space:pre-wrap">${n.text}</div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button style="font-size:11px;padding:3px 8px;border:1px solid var(--border-2);border-radius:6px;background:var(--bg);color:var(--text-2);cursor:pointer;font-family:inherit"
          data-action="notes-edit" data-id="${n.id}">✏️ Edit</button>
        <button style="font-size:11px;padding:3px 8px;border:1px solid #F0C0D0;border-radius:6px;background:#FDE8EE;color:#B04F6C;cursor:pointer;font-family:inherit"
          data-action="notes-delete" data-id="${n.id}">× Delete</button>
      </div>
    </div>`;
  }).join('');
}

// Refresh predictions + elapsed timers every 30s
setInterval(() => {
  computePredictions();
  renderPredictions();
  if (state.napInProgress || state.playInProgress || state.sleepInProgress) renderLogButtons();
}, 30000);

// ── Initial render ──
initFact();
if (localStorage.getItem('fulki_a11y') === '1') {
  document.body.classList.add('a11y');
  document.getElementById('a11y-btn')?.classList.add('on');
}
(function() {
  const saved = localStorage.getItem('fulki_dark');
  const sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved === '1' || (saved === null && sysDark);
  if (isDark) {
    document.body.classList.add('dark');
    const btn = document.getElementById('dark-btn');
    if (btn) btn.textContent = '☀️';
  } else {
    document.body.classList.add('light');
  }
}());
render();

// ── PWA Service Worker ──
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'fulki-v1';
    const URLS  = [self.location.pathname];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting()));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
